services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg15
    container_name: mode_postgres
    environment:
      POSTGRES_DB: modecissions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modecissions"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres_gold:
    image: postgres:15
    container_name: mode_postgres_gold
    environment:
      POSTGRES_DB: modecissions_gold
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "15433:5433"
    command: -p 5433
    volumes:
      - postgres_gold_data:/var/lib/postgresql/data
      - ./init_gold:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modecissions_gold -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mode_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - type: bind
        source: ../data/lakehouse
        target: /data

  # ── Application services ──────────────────────────────────────────────────────

  console:
    build:
      context: ../console
      dockerfile: Dockerfile
    container_name: mode_console
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      DATABASE_URL:      "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      MINIO_ENDPOINT:    minio:9000
      MINIO_ACCESS_KEY:  minio
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET:      lakehouse
      MINIO_SECURE:      "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-gemini}
      CHAT_LLM_MODEL:    ${CHAT_LLM_MODEL:-gemini-1.5-flash}
      GEMINI_CACHE_ENABLED: ${GEMINI_CACHE_ENABLED:-true}
      REFINEMENT_URL:    http://refinement:8500
      MCP_INFRA_URL:     http://mcp-infra:8010
      SUPERSET_URL:      http://superset:8088
      CONSOLE_URL:       ${CONSOLE_URL:-http://localhost:8000}
      WORKSPACE_URL:     ${WORKSPACE_PUBLIC_URL:-http://localhost:8001}
      RAG_URL:           http://mcp-infra:8010   # RAG migrado a mcp-infra
      # SMTP (MailHog en dev; AWS SES en prod)
      SMTP_HOST:         ${SMTP_HOST:-mailhog}
      SMTP_PORT:         ${SMTP_PORT:-1025}
      SMTP_USER:         ${SMTP_USER:-}
      SMTP_PASSWORD:     ${SMTP_PASSWORD:-}
      SMTP_FROM:         ${SMTP_FROM:-noreply@modecissions.local}
      SMTP_USE_TLS:      ${SMTP_USE_TLS:-false}
      APP_BASE_URL:      ${CONSOLE_URL:-http://localhost:8000}
      INVITE_TOKEN_TTL_HOURS: ${INVITE_TOKEN_TTL_HOURS:-72}
      RESET_TOKEN_TTL_HOURS:  ${RESET_TOKEN_TTL_HOURS:-1}
      JWT_SECRET_KEY:    ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM:     ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
    ports:
      - "8000:8000"
    volumes:
      - ../cartridges:/registry/cartridges
      - ../console/app/static:/app/app/static:ro
    depends_on:
      postgres:
        condition: service_healthy
      mcp-infra:
        condition: service_started
      mailhog:
        condition: service_started

  workspace:
    build:
      context: ../workspace
      dockerfile: Dockerfile
    container_name: mode_workspace
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      DATABASE_URL:         "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      REFINEMENT_URL:       http://refinement:8500
      MCP_INFRA_URL:        http://mcp-infra:8010
      CONSOLE_URL:          ${CONSOLE_URL:-http://localhost:8000}
      WORKSPACE_PUBLIC_URL: ${WORKSPACE_PUBLIC_URL:-http://localhost:8001}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      CHAT_LLM_PROVIDER:    ${CHAT_LLM_PROVIDER:-gemini}
      CHAT_LLM_MODEL:       ${CHAT_LLM_MODEL:-gemini-1.5-flash}
      GEMINI_CACHE_ENABLED: ${GEMINI_CACHE_ENABLED:-true}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      refinement:
        condition: service_started
      mcp-infra:
        condition: service_started
    restart: unless-stopped

  refinement:
    build:
      context: ../refinement
      dockerfile: Dockerfile
    container_name: mode_refinement
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      DATABASE_URL:       "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      GOLD_DATABASE_URL:  "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres_gold:5433/modecissions_gold"
      MINIO_ENDPOINT:    minio:9000
      MINIO_ACCESS_KEY:  minio
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET:      lakehouse
      MINIO_SECURE:      "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SQL_LLM_MODEL:     ${SQL_LLM_MODEL:-claude-sonnet-4-6}
    ports:
      - "8500:8500"
    depends_on:
      postgres:
        condition: service_healthy
      postgres_gold:
        condition: service_healthy
      minio:
        condition: service_started


  vault:
    build:
      context: ../vault
      dockerfile: Dockerfile
    container_name: mode_vault
    environment:
      DATABASE_URL:      "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mode_mailhog
    ports:
      - "1025:1025"   # SMTP (consumed by console)
      - "8025:8025"   # Web UI (open in browser to read sent emails)
    restart: unless-stopped

  replicon-mock:
    build:
      context: ./replicon-mock
      dockerfile: Dockerfile
    container_name: mode_replicon_mock
    environment:
      REPLICON_MOCK_USER_COUNT: ${REPLICON_MOCK_USER_COUNT:-1000}
    ports:
      - "8100:8100"
    restart: unless-stopped

  # ── MCP Infrastructure (incluye RAG) ─────────────────────────────────────────

  mcp-infra:
    build:
      context: ../mcp-infra
      dockerfile: Dockerfile
    container_name: mode_mcp_infra
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      AIRFLOW_URL:      http://airflow:8080
      AIRFLOW_USER:     ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER is required}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
      AIRFLOW_DAGS_PATH: /opt/airflow/dags
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET:     lakehouse
      MINIO_SECURE:     "false"
      PG_HOST:          postgres
      PG_PORT:          5432
      PG_DB:            modecissions
      PG_USER:          postgres
      PG_PASSWORD:      ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PG_GOLD_HOST:     postgres_gold
      PG_GOLD_PORT:     5433
      PG_GOLD_DB:       modecissions_gold
      SUPERSET_URL:     http://superset:8088
      SUPERSET_USER:    ${SUPERSET_ADMIN_USER:?SUPERSET_ADMIN_USER is required}
      SUPERSET_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD is required}
      GEMINI_API_KEY:   ${GEMINI_API_KEY:-}
      EMBED_MODEL:      ${EMBED_MODEL:-gemini-embedding-001}
      EMBED_DIM:        ${EMBED_DIM:-768}
    ports:
      - "8010:8010"
    volumes:
      - ../airflow/dags:/opt/airflow/dags   # write DAGs directly
    depends_on:
      postgres:
        condition: service_healthy
      postgres_gold:
        condition: service_healthy
      minio:
        condition: service_started
      airflow:
        condition: service_started
    restart: unless-stopped

  # ── Superset ──────────────────────────────────────────────────────────────────

  superset-init:
    image: apache/superset:3.1.3
    container_name: mode_superset_init
    environment:
      SUPERSET_SECRET_KEY:   ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/superset
    entrypoint: /bin/bash
    command: >
      -c "
        superset db upgrade &&
        superset fab create-admin
          --username ${SUPERSET_ADMIN_USER:?SUPERSET_ADMIN_USER is required}
          --firstname Admin
          --lastname User
          --email admin@modecissions.local
          --password ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD is required} &&
        superset init
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  superset:
    image: apache/superset:3.1.3
    container_name: mode_superset
    environment:
      SUPERSET_SECRET_KEY:     ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/superset
      SUPERSET_WEBSERVER_PORT: 8088
      TALISMAN_ENABLED:        "false"
      WTF_CSRF_ENABLED:        "false"
    command: superset run -p 8088 --with-threads --reload
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Airflow ───────────────────────────────────────────────────────────────────
  # Initializes Airflow metadata idempotently, including existing local Postgres
  # volumes where /docker-entrypoint-initdb.d no longer runs.

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: mode-airflow:2.9.2-local
    container_name: mode_airflow_init
    entrypoint: /bin/bash
    command: >
      -c "
        python -c \"import os, psycopg2; conn = psycopg2.connect(host='postgres', port=5432, dbname='modecissions', user='postgres', password=os.environ['POSTGRES_PASSWORD']); conn.autocommit = True; cur = conn.cursor(); cur.execute(\\\"SELECT 1 FROM pg_database WHERE datname = 'airflow'\\\"); exists = cur.fetchone(); cur.execute('CREATE DATABASE airflow') if exists is None else None; cur.close(); conn.close()\" &&
        airflow db migrate &&
        (airflow connections delete replicon_analytics || true) &&
        airflow connections add replicon_analytics --conn-type http --conn-host http://replicon-mock:8100/analytics --conn-password dummy-local-token &&
        (airflow connections delete replicon_services || true) &&
        airflow connections add replicon_services --conn-type http --conn-host http://replicon-mock:8100/services --conn-password dummy-local-token &&
        (airflow users create --username \"$$AIRFLOW_ADMIN_USER\" --password \"$$AIRFLOW_ADMIN_PASSWORD\" --firstname Admin --lastname User --role Admin --email admin@modecissions.local || true)
      "
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER is required}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      VAULT_URL: http://vault:8300
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      replicon-mock:
        condition: service_started
    restart: "no"

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: mode-airflow:2.9.2-local
    container_name: mode_airflow
    entrypoint: /bin/bash
    command: -c "rm -f /opt/airflow/airflow-webserver.pid && exec airflow webserver"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      # Variables disponibles en los DAGs via Variable.get()
      AIRFLOW_VAR_POSTGRES_CONN: "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      AIRFLOW_VAR_MINIO_ENDPOINT: "minio:9000"
      AIRFLOW_VAR_MINIO_ACCESS_KEY: "minio"
      AIRFLOW_VAR_MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}"
      AIRFLOW_VAR_MINIO_BUCKET: "lakehouse"
      AIRFLOW_VAR_MINIO_SECURE: "false"
      AIRFLOW_VAR_OUTLOOK_RECEIVER_EMAIL: "devnull@modecissions.local"
      AIRFLOW_VAR_OUTLOOK_SENDER_EMAIL: "devnull@modecissions.local"
      AIRFLOW_VAR_OUTLOOK_APP_PASSWORD: "dummy-local-password"
      # Conexiones API — definir aquí o en Airflow UI > Admin > Connections
    ports:
      - "8082:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../cartridges:/registry/cartridges:ro
    depends_on:
      postgres:
        condition: service_healthy
      replicon-mock:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: mode-airflow:2.9.2-local
    container_name: mode_airflow_scheduler
    command: scheduler
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}

      AIRFLOW_ADMIN_USER:                   ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER is required}
      AIRFLOW_ADMIN_PASSWORD:               ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}

      VAULT_URL:                            http://vault:8300
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
      AIRFLOW_VAR_POSTGRES_CONN: "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      AIRFLOW_VAR_MINIO_ENDPOINT: "minio:9000"
      AIRFLOW_VAR_MINIO_ACCESS_KEY: "minio"
      AIRFLOW_VAR_MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}"
      AIRFLOW_VAR_MINIO_BUCKET: "lakehouse"
      AIRFLOW_VAR_MINIO_SECURE: "false"
      AIRFLOW_VAR_OUTLOOK_RECEIVER_EMAIL: "devnull@modecissions.local"
      AIRFLOW_VAR_OUTLOOK_SENDER_EMAIL: "devnull@modecissions.local"
      AIRFLOW_VAR_OUTLOOK_APP_PASSWORD: "dummy-local-password"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../cartridges:/registry/cartridges:ro
    depends_on:
      postgres:
        condition: service_healthy
      replicon-mock:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_gold_data:
