# ============================================================================
# MODecissions — Producción AWS (EC2 single-node)
# Repo clonado en /opt/modecissions/   (este archivo: /opt/modecissions/deploy/)
# postgres / postgres_gold → contenedores en la misma EC2 (paridad con local)
# minio                    → S3
# Imágenes buildeadas localmente con deploy/build.sh
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

networks:
  modecissions_net:
    driver: bridge

services:

  # ── Infrastructure (Postgres en contenedor, igual que local) ──────────────

  postgres:
    image: pgvector/pgvector:pg15
    container_name: mode_postgres
    environment:
      POSTGRES_DB:       modecissions
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/modecissions/infra/init:/docker-entrypoint-initdb.d
    networks:
      - modecissions_net
    restart: unless-stopped
    logging: *default-logging

  postgres_gold:
    image: postgres:15
    container_name: mode_postgres_gold
    environment:
      POSTGRES_DB:       modecissions_gold
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command: -p 5433
    volumes:
      - postgres_gold_data:/var/lib/postgresql/data
      - /opt/modecissions/infra/init_gold:/docker-entrypoint-initdb.d
    networks:
      - modecissions_net
    restart: unless-stopped
    logging: *default-logging

  # ── Application services ──────────────────────────────────────────────────

  console:
    image: modecissions/console:latest
    container_name: mode_console
    env_file: .env
    environment:
      DATABASE_URL:        "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      MINIO_BUCKET:        ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      MINIO_ENDPOINT:      "s3.${AWS_REGION:?AWS_REGION is required}.amazonaws.com"
      MINIO_ACCESS_KEY:    ${AWS_ACCESS_KEY_ID:-}
      MINIO_SECRET_KEY:    ${AWS_SECRET_ACCESS_KEY:-}
      MINIO_SECURE:        "true"
      AWS_DEFAULT_REGION:  ${AWS_REGION:?AWS_REGION is required}
      S3_BUCKET_NAME:      ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:      ${GEMINI_API_KEY:-}
      CHAT_LLM_PROVIDER:   ${CHAT_LLM_PROVIDER:-anthropic}
      CHAT_LLM_MODEL:      ${CHAT_LLM_MODEL:-claude-haiku-4-5-20251001}
      GEMINI_CACHE_ENABLED: ${GEMINI_CACHE_ENABLED:-true}
      REFINEMENT_URL:      http://refinement:8500
      MCP_INFRA_URL:       http://mcp-infra:8010
      SUPERSET_URL:        http://superset:8088
      CONSOLE_URL:         ${CONSOLE_URL:-http://localhost:8000}
      WORKSPACE_URL:       ${WORKSPACE_PUBLIC_URL:-http://localhost:8001}
      RAG_URL:             http://mcp-infra:8010   # RAG migrado a mcp-infra
      # SMTP: MailHog en VPC interno hasta que se enchufe SES
      SMTP_HOST:           ${SMTP_HOST:-mailhog}
      SMTP_PORT:           ${SMTP_PORT:-1025}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASSWORD:       ${SMTP_PASSWORD:-}
      SMTP_FROM:           ${SMTP_FROM:-noreply@modecissions.local}
      SMTP_USE_TLS:        ${SMTP_USE_TLS:-false}
      APP_BASE_URL:        ${CONSOLE_URL:-http://localhost:8000}
      INVITE_TOKEN_TTL_HOURS: ${INVITE_TOKEN_TTL_HOURS:-72}
      RESET_TOKEN_TTL_HOURS:  ${RESET_TOKEN_TTL_HOURS:-1}
      JWT_SECRET_KEY:      ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM:       ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
    ports:
      - "8000:8000"
    volumes:
      - /opt/modecissions/cartridges:/registry/cartridges
      - /opt/modecissions/console/app/static:/app/app/static:ro
    networks:
      - modecissions_net
    depends_on:
      - postgres
      - mcp-infra
      - mailhog
    restart: unless-stopped
    logging: *default-logging

  workspace:
    image: modecissions/workspace:latest
    container_name: mode_workspace
    env_file: .env
    environment:
      DATABASE_URL:         "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      REFINEMENT_URL:       http://refinement:8500
      MCP_INFRA_URL:        http://mcp-infra:8010
      CONSOLE_URL:          ${CONSOLE_URL:-http://localhost:8000}
      WORKSPACE_PUBLIC_URL: ${WORKSPACE_PUBLIC_URL:-http://localhost:8001}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      CHAT_LLM_PROVIDER:    ${CHAT_LLM_PROVIDER:-anthropic}
      CHAT_LLM_MODEL:       ${CHAT_LLM_MODEL:-claude-haiku-4-5-20251001}
      GEMINI_CACHE_ENABLED: ${GEMINI_CACHE_ENABLED:-true}
    ports:
      - "8001:8001"
    networks:
      - modecissions_net
    depends_on:
      - postgres
      - refinement
      - mcp-infra
    restart: unless-stopped
    logging: *default-logging

  refinement:
    image: modecissions/refinement:latest
    container_name: mode_refinement
    env_file: .env
    environment:
      DATABASE_URL:       "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      GOLD_DATABASE_URL:  "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres_gold:5433/modecissions_gold"
      MINIO_BUCKET:       ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      MINIO_ENDPOINT:     "s3.${AWS_REGION:?AWS_REGION is required}.amazonaws.com"
      MINIO_ACCESS_KEY:   ${AWS_ACCESS_KEY_ID:-}
      MINIO_SECRET_KEY:   ${AWS_SECRET_ACCESS_KEY:-}
      MINIO_SECURE:       "true"
      AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}
      S3_BUCKET_NAME:     ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      SQL_LLM_MODEL:      ${SQL_LLM_MODEL:-claude-sonnet-4-6}
    ports:
      - "8500:8500"
    networks:
      - modecissions_net
    depends_on:
      - postgres
      - postgres_gold
    restart: unless-stopped
    logging: *default-logging


  vault:
    image: modecissions/vault:latest
    container_name: mode_vault
    env_file: .env
    environment:
      DATABASE_URL:      "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      INTERNAL_API_KEY:  ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: unless-stopped
    logging: *default-logging

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mode_mailhog
    ports:
      - "1025:1025"   # SMTP (consumed by console)
      - "8025:8025"   # Web UI (only accessible from VPN peers via App SG)
    networks:
      - modecissions_net
    restart: unless-stopped
    logging: *default-logging

  # ── MCP Infrastructure ────────────────────────────────────────────────────

  mcp-infra:
    image: modecissions/mcp-infra:latest
    container_name: mode_mcp_infra
    env_file: .env
    environment:
      AIRFLOW_URL:       http://airflow:8080
      AIRFLOW_USER:      ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER is required}
      AIRFLOW_PASSWORD:  ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
      AIRFLOW_DAGS_PATH: /opt/airflow/dags
      MINIO_BUCKET:      ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      MINIO_ENDPOINT:    "s3.${AWS_REGION:?AWS_REGION is required}.amazonaws.com"
      MINIO_ACCESS_KEY:  ${AWS_ACCESS_KEY_ID:-}
      MINIO_SECRET_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      MINIO_SECURE:      "true"
      AWS_DEFAULT_REGION: ${AWS_REGION:?AWS_REGION is required}
      S3_BUCKET_NAME:    ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      PG_HOST:           postgres
      PG_PORT:           5432
      PG_DB:             modecissions
      PG_USER:           postgres
      PG_PASSWORD:       ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PG_GOLD_HOST:      postgres_gold
      PG_GOLD_PORT:      5433
      PG_GOLD_DB:        modecissions_gold
      SUPERSET_URL:      http://superset:8088
      SUPERSET_USER:     ${SUPERSET_ADMIN_USER:?SUPERSET_ADMIN_USER is required}
      SUPERSET_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD is required}
    ports:
      - "8010:8010"
    volumes:
      - /opt/modecissions/airflow/dags:/opt/airflow/dags
    networks:
      - modecissions_net
    depends_on:
      - postgres
      - postgres_gold
      - airflow
    restart: unless-stopped
    logging: *default-logging

  # ── Superset ──────────────────────────────────────────────────────────────

  superset-init:
    image: apache/superset:3.1.3
    container_name: mode_superset_init
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      POSTGRES_PASSWORD:   ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /opt/modecissions/infra/terraform/deploy/superset_config/superset_config.py:/app/pythonpath/superset_config.py:ro
    entrypoint: /bin/bash
    # Single-line command — YAML folded scalars (>) preserve newlines on
    # indented continuation lines, which breaks bash multi-arg commands.
    command: -c "superset db upgrade && superset fab create-admin --username ${SUPERSET_ADMIN_USER:?SUPERSET_ADMIN_USER is required} --firstname Admin --lastname User --email admin@modecissions.local --password \"$$SUPERSET_ADMIN_PASSWORD\" && superset init"
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: "no"
    logging: *default-logging

  superset:
    image: apache/superset:3.1.3
    container_name: mode_superset
    env_file: .env
    environment:
      SUPERSET_SECRET_KEY:     ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      POSTGRES_PASSWORD:       ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SUPERSET_WEBSERVER_PORT: 8088
    volumes:
      - /opt/modecissions/infra/terraform/deploy/superset_config/superset_config.py:/app/pythonpath/superset_config.py:ro
    # -h 0.0.0.0: bindear en todas las interfaces, NO solo 127.0.0.1, para que
    # docker-proxy pueda forwardear desde el host al contenedor. Sin esto,
    # "Up (healthy)" pero curl desde host devuelve 000.
    command: superset run -h 0.0.0.0 -p 8088 --with-threads --reload
    ports:
      - "8088:8088"
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: unless-stopped
    logging: *default-logging

  # ── Airflow ───────────────────────────────────────────────────────────────
  # Init (correr una vez):
  #   docker compose -f docker-compose.aws.yml run --rm airflow-init

  airflow-init:
    image: apache/airflow:2.9.2
    container_name: mode_airflow_init
    env_file: .env
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username \"$$AIRFLOW_ADMIN_USER\" --password \"$$AIRFLOW_ADMIN_PASSWORD\" --firstname Admin --lastname User --role Admin --email admin@modecissions.local"
    environment:
      AIRFLOW_ADMIN_USER:                   ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER is required}
      AIRFLOW_ADMIN_PASSWORD:               ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD is required}
      AIRFLOW__CORE__EXECUTOR:              LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow"
      AIRFLOW__CORE__LOAD_EXAMPLES:         "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:       ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
      INTERNAL_API_KEY:                     ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      VAULT_URL:                            http://vault:8300
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: "no"
    logging: *default-logging

  airflow:
    image: apache/airflow:2.9.2
    container_name: mode_airflow
    env_file: .env
    entrypoint: /bin/bash
    command: -c "rm -f /opt/airflow/airflow-webserver.pid && exec airflow webserver"
    environment:
      AIRFLOW__CORE__EXECUTOR:              LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow"
      AIRFLOW__CORE__LOAD_EXAMPLES:         "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:       ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
      INTERNAL_API_KEY:                     ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      VAULT_URL:                            http://vault:8300
      AIRFLOW__API__AUTH_BACKENDS:          "airflow.api.auth.backend.basic_auth"
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow boto3 minio psycopg2-binary openpyxl"
      AIRFLOW_VAR_POSTGRES_CONN:            "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      AIRFLOW_VAR_S3_BUCKET:                ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      AIRFLOW_VAR_MINIO_BUCKET:             ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      AIRFLOW_VAR_MINIO_ENDPOINT:           "s3.${AWS_REGION:?AWS_REGION is required}.amazonaws.com"
      AIRFLOW_VAR_MINIO_ACCESS_KEY:         ${AWS_ACCESS_KEY_ID:-}
      AIRFLOW_VAR_MINIO_SECRET_KEY:         ${AWS_SECRET_ACCESS_KEY:-}
      AIRFLOW_VAR_MINIO_SECURE:             "true"
      AIRFLOW_VAR_AWS_REGION:               ${AWS_REGION:?AWS_REGION is required}
    ports:
      - "8082:8080"
    volumes:
      - /opt/modecissions/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
      - /opt/modecissions/cartridges:/registry/cartridges:ro
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: unless-stopped
    logging: *default-logging

  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: mode_airflow_scheduler
    env_file: .env
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR:              LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:  "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/airflow"
      AIRFLOW__CORE__LOAD_EXAMPLES:         "false"
      AIRFLOW__WEBSERVER__SECRET_KEY:       ${AIRFLOW_SECRET_KEY:?AIRFLOW_SECRET_KEY is required}
      INTERNAL_API_KEY:                     ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      VAULT_URL:                            http://vault:8300
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow boto3 minio psycopg2-binary openpyxl"
      AIRFLOW_VAR_POSTGRES_CONN:            "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/modecissions"
      AIRFLOW_VAR_S3_BUCKET:                ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      AIRFLOW_VAR_MINIO_BUCKET:             ${S3_BUCKET_NAME:?S3_BUCKET_NAME is required}
      AIRFLOW_VAR_MINIO_ENDPOINT:           "s3.${AWS_REGION:?AWS_REGION is required}.amazonaws.com"
      AIRFLOW_VAR_MINIO_ACCESS_KEY:         ${AWS_ACCESS_KEY_ID:-}
      AIRFLOW_VAR_MINIO_SECRET_KEY:         ${AWS_SECRET_ACCESS_KEY:-}
      AIRFLOW_VAR_MINIO_SECURE:             "true"
      AIRFLOW_VAR_AWS_REGION:               ${AWS_REGION:?AWS_REGION is required}
    volumes:
      - /opt/modecissions/airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
      - /opt/modecissions/cartridges:/registry/cartridges:ro
    networks:
      - modecissions_net
    depends_on:
      - postgres
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  postgres_gold_data:
  airflow_logs:
  airflow_plugins:
  wireguard_data:
