<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MODecissions · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/viewer.css">
  <style>
    /* Studio overrides viewer.css: full-page layout with scroll only inside panels */
    html, body { overflow: hidden; height: 100%; }

    /* ── Studio layout ── */
    .studio-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .studio-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 44px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .studio-logo {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }
    .studio-logo .accent { color: var(--amber); }
    .studio-badge {
      font-size: 9px;
      color: var(--amber);
      border: 1px solid var(--amber);
      padding: 2px 8px;
      border-radius: 2px;
      font-family: var(--font-mono);
    }
    .studio-hdr-nav { display: flex; gap: 6px; margin-left: auto; }
    .hdr-lnk {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text3); text-decoration: none;
      padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
      transition: color .15s, border-color .15s;
    }
    .hdr-lnk:hover { color: var(--green); border-color: var(--green); }
    .hdr-lnk.monitor:hover { color: var(--cyan); border-color: var(--cyan); }

    /* ── Step bar ── */
    .step-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 16px;
      height: 40px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      height: 100%;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      font-family: var(--font-ui);
      letter-spacing: 0;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .15s;
    }
    .step-item:hover { color: var(--text); }
    .step-item.active { color: var(--amber); border-bottom-color: var(--amber); }
    .step-item.done   { color: var(--green); }
    .step-num {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; flex-shrink: 0;
    }
    .step-item.done .step-num { background: var(--green); color: var(--bg); border-color: var(--green); }
    .step-arrow { color: var(--border); font-size: 14px; padding: 0 2px; flex-shrink: 0; }

    /* ── Studio body ── */
    .studio-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Main step content */
    .step-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      min-width: 0;
    }

    /* AI panel resize handle */
    .ai-resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      border-left: 1px solid var(--border);
      transition: background .15s;
      position: relative;
      z-index: 10;
    }
    .ai-resize-handle:hover,
    .ai-resize-handle.dragging { background: var(--green); opacity: .4; }

    /* AI panel */
    .ai-panel {
      width: 320px;
      min-width: 180px;
      max-width: 60vw;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      overflow: hidden;
    }
    .ai-hdr {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--green);
      font-family: var(--font-ui);
      flex-shrink: 0;
    }
    .ai-ctx-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--amber);
      background: var(--bg);
      border: 1px solid var(--amber);
      padding: 1px 6px;
      border-radius: 2px;
    }
    .ai-chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ai-hint {
      font-size: 10px;
      color: var(--text3);
      font-style: italic;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      line-height: 1.6;
      background: var(--bg);
    }
    .ai-msg { font-size: 11px; line-height: 1.6; }
    .ai-msg.ai-user .ai-role  { color: var(--text3); font-size: 9px; display:block; margin-bottom:3px; font-family:var(--font-mono); }
    .ai-msg.ai-assistant .ai-role { color: var(--green); font-size: 9px; display:block; margin-bottom:3px; font-family:var(--font-ui); font-weight:600; }
    .ai-msg.ai-user .ai-body  { color: var(--text2); background: var(--bg); padding: 6px 10px; border-radius: 3px; }
    .ai-msg.ai-assistant .ai-body { color: var(--text); }
    .ai-msg.ai-assistant .ai-body pre { background:var(--bg); padding:6px; font-size:10px; overflow-x:auto; border-radius:2px; }
    .ai-msg.ai-assistant .ai-body code { color:var(--cyan); font-size:10px; }
    .ai-typing { color: var(--green); letter-spacing: 4px; animation: pulse 1s infinite; font-size: 14px; padding: 4px; }

    /* ── Reasoning trail ────────────────────────────────────────────── */
    .ai-trail {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 8px;
      margin: 4px 0;
      border-left: 2px solid var(--border);
      color: var(--text3);
    }
    .trail-row { display: flex; gap: 6px; align-items: baseline; line-height: 1.5; }
    .trail-row.use      .trail-arrow { color: var(--cyan); }
    .trail-row.result   .trail-arrow { color: var(--green); }
    .trail-row.error    .trail-arrow { color: #ff2d55; }
    .trail-row .tool    { color: var(--text2); font-weight: 600; }
    .trail-row .args    { color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    .trail-row .summary { color: var(--green); }
    .trail-row.thinking { color: var(--text3); font-style: italic; }
    .trail-arrow { display: inline-block; min-width: 12px; }
    .ai-trail.collapsed .trail-row:not(.thinking) { display: none; }
    .trail-toggle {
      background: none; border: none; color: var(--text3);
      font-family: var(--font-mono); font-size: 9px;
      padding: 2px 8px; cursor: pointer;
    }
    .trail-toggle:hover { color: var(--cyan); }
    .ai-input-bar {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .ai-input-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.5;
      padding: 6px 10px;
      border-radius: 2px;
      resize: none;
      overflow-y: auto;
      min-height: 32px;
      max-height: 200px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .ai-input-bar textarea:focus { outline: none; border-color: var(--green); }
    .ai-input-bar .btn { padding: 5px 12px; font-size: 11px; }

    /* ── Step content elements ── */
    .step-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 12px;
    }
    .step-title h2 {
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 0;
      margin-bottom: 6px;
    }
    .step-desc { font-size: 11px; color: var(--text3); line-height: 1.7; }

    .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .item-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }
    .item-card.ok { border-left: 3px solid var(--green); }
    .item-card.err { border-left: 3px solid var(--red, #ff2d55); }
    .ic-hdr { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
    .ic-icon { font-size:16px; color:var(--green); flex-shrink:0; margin-top:2px; }
    .ic-name { font-family:var(--font-mono); font-size:12px; color:var(--text); }
    .ic-id   { font-size:9px; color:var(--text3); margin-top:2px; }
    .ic-status-ok  { font-size:10px; color:var(--green); margin-left:auto; white-space:nowrap; }
    .ic-status-err { font-size:10px; color:#ff2d55; margin-left:auto; white-space:nowrap; }
    .ic-desc { font-size:10px; color:var(--text2); margin-bottom:8px; line-height:1.6; }
    .ic-meta { display:flex; gap:10px; font-size:9px; color:var(--text3); flex-wrap:wrap; }
    .ic-meta span { background:var(--bg); padding:1px 6px; border-radius:2px; font-family:var(--font-mono); }

    .form-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px 12px;
      align-items: center;
    }
    .form-grid label { font-size: 10px; color: var(--text3); text-align: right; }
    .form-grid input, .form-grid select { width: 100%; box-sizing: border-box; }

    .et-table { width: 100%; }
    .et-hdr, .et-row {
      display: grid;
      grid-template-columns: 150px 150px 90px 120px 1fr;
      gap: 8px;
      padding: 7px 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    .et-hdr { color:var(--green); font-family:var(--font-ui); font-weight:600; font-size:10px; background:var(--bg2); }
    .et-row:hover { background: var(--bg2); }
    .et-name { font-family:var(--font-mono); color:var(--amber); }
    .et-wm   { color:var(--cyan); font-size:9px; font-family:var(--font-mono); }
    .et-num  { color:var(--text3); text-align:center; }

    /* Run status badge */
    .run-badge { display:flex; align-items:center; gap:4px; margin-top:3px; font-size:9px; font-family:var(--font-mono); }
    .run-dot-ok    { color:var(--green); }
    .run-dot-fail  { color:#ff2d55; }
    .run-dot-never { color:#444; }
    .run-dot-run   { color:var(--cyan); animation:pulse 1s infinite; }

    /* Vertical (horizontal-drag) resize handle between query and preview */
    .v-resize-handle {
      height: 6px;
      flex-shrink: 0;
      cursor: row-resize;
      background: transparent;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: background .15s;
    }
    .v-resize-handle::after {
      content: '· · ·';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--text3);
      user-select: none;
    }
    .v-resize-handle:hover,
    .v-resize-handle.dragging { background: var(--green); opacity: .4; }

    /* Vista previa / Preview panel */
    .et-preview {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      padding: 0;
      overflow: hidden;
      transition: max-height .2s;
    }
    .et-preview-inner { padding: 12px 14px; }
    .preview-stats { display:flex; gap:16px; margin-bottom:10px; flex-wrap:wrap; font-size:10px; }
    .preview-stat  { color:var(--text3); }
    .preview-stat span { color:var(--cyan); font-family:var(--font-mono); }
    .preview-schema { margin-bottom:10px; }
    .schema-cols { display:flex; flex-wrap:wrap; gap:5px; }
    .schema-col {
      padding:2px 7px; font-family:var(--font-mono); font-size:9px;
      border:1px solid var(--border); border-radius:2px; color:var(--text2);
    }
    .schema-col em { color:var(--text3); font-style:normal; }
    .preview-data-tbl { width:100%; border-collapse:collapse; font-size:10px; overflow-x:auto; display:block; }
    .preview-data-tbl th { background:var(--bg2); color:var(--text3); padding:3px 8px;
                           border:1px solid var(--border); font-weight:600; white-space:nowrap; font-family:var(--font-ui); font-size:9px; }
    .preview-data-tbl td { padding:3px 8px; border:1px solid var(--border); color:var(--text);
                           max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .preview-err { color:#ff2d55; font-size:11px; font-style:italic; }
    .mode-chip {
      display:inline-block; padding:1px 5px;
      border-radius:2px; font-size:8px; font-family:var(--font-mono); margin-right:3px;
    }
    .mode-full  { background:rgba(63,185,80,.12);  color:var(--green); border:1px solid var(--green); }
    .mode-delta { background:rgba(210,153,34,.12); color:var(--amber); border:1px solid var(--amber); }
    .mode-patch { background:rgba(88,166,255,.12); color:var(--cyan);  border:1px solid var(--cyan);  }

    .ds-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .ds-row:last-child { border-bottom: none; }
    .ds-row-name { font-family:var(--font-mono); font-size:11px; color:var(--amber); margin-bottom:3px; }
    .ds-row-meta { font-size:10px; color:var(--text3); }
    .ds-list-item:hover { background: var(--bg2); }
    .ds-row-active { background: var(--bg2) !important; border-left: 2px solid var(--amber); }

    .btn-amber { border-color:var(--amber); color:var(--amber); }
    .btn-amber:hover { background:var(--amber); color:var(--bg); }
    .btn-danger { border-color:#ff2d55; color:#ff2d55; }
    .btn-danger:hover { background:#ff2d55; color:var(--bg); }

    .empty-card { padding: 30px; text-align: center; color: var(--text3); font-size: 11px; font-style: italic; }
    .loading    { padding: 30px; text-align: center; color: var(--text3); font-size: 11px; }

    .feature-coming {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 11px;
      color: var(--text2);
    }
    .feature-coming .icon { color: var(--amber); font-size: 14px; }

    /* ── Cartridge selector bar ── */
    .cartridge-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 38px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cartridge-bar select {
      height: 26px;
      padding: 0 8px;
      font-size: 11px;
      min-width: 200px;
    }
    .cartridge-info {
      margin-left: 8px;
      font-size: 10px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cartridge-info .ci-name  { color: var(--amber); font-weight: 600; }
    .cartridge-info .ci-badge {
      font-size: 9px;
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 10px;
    }

    /* ── Connection status cards (kept for potential future use) ── */
    .conn-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }
    .conn-card.configured { border-left: 3px solid var(--green); }
    .conn-card.missing    { border-left: 3px solid #555; }
    .conn-hdr { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .conn-id  { font-family: var(--font-mono); font-size: 12px; color: var(--amber); }
    .conn-desc { font-size: 10px; color: var(--text2); margin-bottom: 10px; line-height: 1.6; }
    .conn-fields { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .conn-field  { display: flex; gap: 8px; font-size: 10px; }
    .conn-field .cf-key { color: var(--text3); width: 90px; flex-shrink: 0; text-align: right; font-family: var(--font-mono); font-size: 9px; }
    .conn-field .cf-val { color: var(--text2); font-family: var(--font-mono); word-break: break-all; }
    .conn-field .cf-val.ok  { color: var(--green); }
    .conn-field .cf-val.missing { color: #555; font-style: italic; }
    .conn-status-ok  { font-size: 9px; color: var(--green); margin-left: auto; }
    .conn-status-bad { font-size: 9px; color: #888; margin-left: auto; }

    /* ── File upload dropzone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s;
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--cyan);
      background: rgba(88,166,255,.04);
    }
    .upload-zone .uz-icon { font-size: 20px; color: var(--text3); margin-bottom: 6px; }
    .upload-zone .uz-label { font-size: 11px; color: var(--text2); }
    .upload-zone .uz-sub   { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .upload-zone input[type=file] { display: none; }

    /* ── Create cartridge modal ── */
    .cc-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .cc-modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      width: 360px;
      max-width: 90vw;
    }
    .cc-modal h3 { font-family: var(--font-ui); font-size: 14px; font-weight: 700; margin-bottom: 16px; }

    /* ── Step 2: DAG editor (embedded) ── */
    .dag-editor-step {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 122px);
      min-height: 400px;
    }
    .dag-editor-layout {
      display: flex; flex: 1; min-height: 0; overflow: hidden;
      border-top: 1px solid var(--border);
    }
    .dag-sidebar {
      width: 220px; flex-shrink: 0; border-right: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .dag-sidebar-hdr {
      padding: 8px 12px; font-family: var(--font-ui); font-size: 10px;
      font-weight: 600; color: var(--text3); letter-spacing: .06em;
      border-bottom: 1px solid var(--border); background: var(--bg2);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .dag-sidebar-item {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .12s;
    }
    .dag-sidebar-item:last-child { border-bottom: none; }
    .dag-sidebar-item:hover     { background: var(--bg2); }
    .dag-sidebar-item.selected  { background: rgba(210,153,34,.08); border-left: 2px solid var(--amber); }
    .dag-item-id   { font-family: var(--font-mono); font-size: 11px; color: var(--amber); margin-bottom: 3px; word-break: break-all; }
    .dag-item-meta { font-size: 9px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
    .dag-code-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .dag-code-toolbar {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-bottom: 1px solid var(--border); background: var(--bg2);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .dag-code-name { font-family: var(--font-mono); font-size: 12px; color: var(--amber); flex: 1;
                     min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dag-editor-wrap { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    .dag-line-numbers {
      flex-shrink: 0; width: 42px; background: var(--bg2); border-right: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 11px; line-height: 1.6; color: var(--text3);
      padding: 14px 6px 14px 0; text-align: right; overflow: hidden; user-select: none;
    }
    .dag-line-numbers span { display: block; }
    .dag-code-textarea {
      flex: 1; background: var(--bg); color: var(--text1);
      font-family: var(--font-mono); font-size: 11px; line-height: 1.6;
      border: none; outline: none; resize: none; padding: 14px 16px;
      tab-size: 4; white-space: pre; overflow-wrap: normal; overflow-x: auto; overflow-y: auto;
    }
    .dag-deploy-bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
    }
    .deploy-msg { font-size: 10px; font-family: var(--font-mono); flex: 1; }
    .deploy-ok  { color: var(--green); }
    .deploy-err { color: #ff2d55; }
    .dag-empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text3); font-size: 12px; font-style: italic;
    }
    .dag-badge { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: 9px; font-family: var(--font-mono); }
    .dag-active { background: rgba(63,185,80,.12); color: var(--green); border: 1px solid var(--green); }
    .dag-paused { background: rgba(100,100,100,.12); color: #666; border: 1px solid #444; }
    .dag-graph-panel {
      background: var(--bg); overflow: auto; transition: width .2s;
    }
    .dag-graph-panel.collapsed { width: 0 !important; overflow: hidden; border-right: none !important; }
    .dag-graph-node rect { transition: stroke .12s; }
    .dag-graph-node:hover rect { stroke: var(--amber) !important; }
    .dag-graph-node.active rect { stroke: var(--amber) !important; stroke-width: 2; }
    .tpl-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
    .tpl-item:last-child  { border-bottom: none; }
    .tpl-item:hover       { background: var(--bg2); }
    .tpl-item-name  { font-family: var(--font-ui); font-size: 11px; color: var(--cyan); margin-bottom: 2px; }
    .tpl-item-desc  { font-size: 9px; color: var(--text3); line-height: 1.4; }
    .tpl-tags       { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
    .tpl-tag        { font-size: 8px; font-family: var(--font-mono); padding: 1px 4px;
                      border: 1px solid var(--border); border-radius: 2px; color: var(--text3); }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="scanlines"></div>

  <div class="studio-layout">

    <!-- Header -->
    <div class="studio-header">
      <span class="studio-logo">MO<span class="accent">D</span>ECISSIONS</span>
      <span class="studio-badge">STUDIO</span>
      <div class="studio-hdr-nav">
        <a href="/monitor" class="hdr-lnk monitor">◈ Monitor</a>
        <a href="/rag" class="hdr-lnk" style="color:var(--cyan);border-color:var(--cyan)">◈ RAG</a>
        <a href="/" class="hdr-lnk">⌂ Inicio</a>
      </div>
    </div>

    <!-- Step bar -->
    <div class="step-bar">
      <div class="step-item active" id="si-1" onclick="goStep(1)">
        <span class="step-num">1</span> RESUMEN
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-2" onclick="goStep(2)" style="color:var(--amber)">
        <span class="step-num">2</span> DAGS
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-3" onclick="goStep(3)">
        <span class="step-num">3</span> ENTIDADES
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-4" onclick="goStep(4)">
        <span class="step-num">4</span> REFINAR
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-5" onclick="goStep(5)">
        <span class="step-num">5</span> ANALYTICS
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-6" onclick="goStep(6)">
        <span class="step-num">6</span> IA SEMÁNTICA
      </div>
      <div class="step-arrow">›</div>
      <div class="step-item" id="si-7" onclick="goStep(7)" style="color:var(--cyan)">
        <span class="step-num">7</span> RAG
      </div>
    </div>

    <!-- Cartridge selector bar -->
    <div class="cartridge-bar">
      <span style="font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap">CARTUCHO</span>
      <select id="cartridge-sel" onchange="selectCartridge(this.value)">
        <option value="">— seleccionar o crear —</option>
      </select>
      <button class="btn btn-sm" onclick="showCreateCartridge()">+ Nuevo</button>
      <div class="cartridge-info" id="cartridge-info"></div>
      <button class="btn btn-sm" id="btn-export-cart" style="display:none;margin-left:auto"
              onclick="exportCartridge()">↓ ZIP</button>
    </div>

    <!-- Body -->
    <div class="studio-body">

      <!-- Step content -->
      <main class="step-content" id="step-content">
        <div class="loading">Cargando...</div>
      </main>

      <!-- AI panel resize handle -->
      <div class="ai-resize-handle" id="ai-resize-handle"
           onmousedown="aiResizeStart(event)"></div>

      <!-- AI assistant -->
      <aside class="ai-panel" id="ai-panel">
        <div class="ai-hdr">
          ◈ ASISTENTE IA
          <span class="ai-ctx-badge" id="ai-ctx-badge">Paso 1</span>
          <button class="btn-sm" id="ai-clear-btn" onclick="aiClearHistory()" title="Borrar historial" style="margin-left:auto;color:var(--text3);opacity:0.6">🗑</button>
        </div>
        <div class="ai-chat" id="ai-chat"></div>
        <div class="ai-input-bar">
          <textarea id="ai-input" rows="2" placeholder="Pregunta al asistente... (Shift+Enter = nueva línea)" onkeydown="aiKey(event)" oninput="aiAutogrow(this)"></textarea>
          <button class="btn" onclick="aiSend()">▶</button>
        </div>
      </aside>

    </div>
  </div>

  <script>
    // Apply saved theme
    document.documentElement.dataset.theme = localStorage.getItem('mod-theme') || 'dark';

    // S3/MinIO bucket — viene de /api/config; default cubre dev local.
    let S3_BUCKET = 'lakehouse';
    fetch('/api/config').then(r => r.json())
      .then(d => { if (d.s3_bucket) S3_BUCKET = d.s3_bucket; })
      .catch(() => {});

    let currentStep       = 0;
    let aiHistory         = [];
    let aiBusy            = false;
    let _allDatasets      = [];
    let _activeLayer      = 'bronze';
    let _bronzeSources    = [];   // [{source, cartridge, entity, partitions}]
    let _bronzeQuery      = '';   // last query text
    let _currentCartridge = null;   // full manifest object
    let _cartridges       = [];     // list from /studio/cartridges

    const STEP_LABELS = {
      1: 'RESUMEN',
      2: 'DAGS',
      3: 'ENTIDADES',
      4: 'REFINAR',
      5: 'ANALYTICS',
      6: 'IA SEMÁNTICA',
      7: 'RAG',
    };

    const STEP_HINTS = {
      1: 'Paso 1 — Resumen: visión general del cartucho seleccionado. Puedo ayudarte a crear uno nuevo o importar desde un ZIP. Describe el sistema origen y te guío.',
      2: 'Paso 2 — DAGs: edita y despliega los DAGs de Airflow de este cartucho. Puedo generar un DAG completo si me describes la API o la lógica de extracción.',
      3: 'Paso 3 — Entidades: qué objetos extraer del sistema origen, en qué modo (full/incremental) y qué DAG de Airflow los procesa. Puedo generar DAGs nuevos si me describes la API.',
      4: 'Paso 4 — Refinamiento: crea datasets Silver (snapshot limpio) y Gold (agregaciones). Soy experto en DuckDB y SQL para lakehouse.',
      5: 'Paso 5 — Analytics: publica datasets Gold en herramientas de reporting. Superset, métricas de negocio, KPIs.',
      6: 'Paso 6 — IA Semántica: define el vocabulario de negocio para que el asistente entienda lenguaje natural.',
      7: 'Paso 7 — RAG: ingresa documentos a la base de conocimiento (texto o PDF). Puedo buscar semánticamente en ellos y citarlos en mis respuestas.',
    };

    // ── Cartridge management ───────────────────────────────────────────────────

    async function loadCartridges() {
      try {
        const r = await fetch('/studio/cartridges');
        const d = await r.json();
        _cartridges = d.cartridges || [];
      } catch(e) { _cartridges = []; }

      const sel = document.getElementById('cartridge-sel');
      const cur = _currentCartridge?.id || '';
      sel.innerHTML = '<option value="">— seleccionar o crear —</option>'
        + _cartridges.map(c =>
            `<option value="${esc(c.id)}" ${c.id === cur ? 'selected' : ''}>${esc(c.name)} (${esc(c.id)})</option>`
          ).join('');
    }

    async function selectCartridge(id) {
      if (!id) { _currentCartridge = null; _updateCartridgeInfo(); return; }
      try {
        const r = await fetch(`/studio/cartridges/${encodeURIComponent(id)}`);
        _currentCartridge = await r.json();
        _updateCartridgeInfo();
        const sel = document.getElementById('cartridge-sel');
        if (sel) sel.value = id;
        // Reset per-cartridge state
        _selectedDag = null;
        _selectedDS  = null;
        // Refresh current step with new context
        if (currentStep > 0) goStep(currentStep);
      } catch(e) {
        _currentCartridge = null;
      }
    }

    function _updateCartridgeInfo() {
      const info = document.getElementById('cartridge-info');
      const btn  = document.getElementById('btn-export-cart');
      if (!_currentCartridge) {
        info.innerHTML = '';
        if (btn) btn.style.display = 'none';
        return;
      }
      const c = _currentCartridge;
      const ents = (c.entities || []).length;
      const conn = c.connector?.type || '—';
      info.innerHTML = `
        <span class="ci-name">${esc(c.name)}</span>
        <span class="ci-badge">v${esc(c.version || '0.1.0')}</span>
        <span class="ci-badge">${esc(conn)}</span>
        <span class="ci-badge">${esc(ents)} entidades</span>`;
      if (btn) btn.style.display = '';
    }

    function showCreateCartridge() {
      // Inline modal
      const overlay = document.createElement('div');
      overlay.className = 'cc-modal-overlay';
      overlay.id = 'cc-overlay';
      overlay.innerHTML = `
        <div class="cc-modal">
          <h3>Nuevo Cartucho</h3>
          <div class="form-grid" style="margin-bottom:16px">
            <label>ID único</label>
            <input type="text" id="cc-id" placeholder="ej: sap_erp" autocomplete="off">
            <label>Nombre</label>
            <input type="text" id="cc-name" placeholder="ej: SAP ERP">
            <label>Descripción</label>
            <input type="text" id="cc-desc" placeholder="Opcional">
          </div>
          <div id="cc-msg" style="font-size:11px;min-height:16px;margin-bottom:10px"></div>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="doCreateCartridge()">✓ Crear</button>
            <button class="btn" onclick="document.getElementById('cc-overlay').remove()">✕ Cancelar</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.getElementById('cc-id').focus();
    }

    async function doCreateCartridge() {
      const id   = document.getElementById('cc-id').value.trim();
      const name = document.getElementById('cc-name').value.trim();
      const desc = document.getElementById('cc-desc').value.trim();
      const msg  = document.getElementById('cc-msg');
      if (!id || !name) { msg.innerHTML = '<span style="color:#ff2d55">ID y nombre son obligatorios</span>'; return; }
      try {
        const r = await fetch('/studio/cartridges', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({id, name, description: desc}),
        });
        const d = await r.json();
        if (r.ok) {
          _currentCartridge = d;
          await loadCartridges();
          document.getElementById('cartridge-sel').value = id;
          _updateCartridgeInfo();
          document.getElementById('cc-overlay').remove();
          // Suggest starting Step 1
          if (currentStep === 1) renderCartridges();
        } else {
          msg.innerHTML = `<span style="color:#ff2d55">${esc(d.detail || JSON.stringify(d))}</span>`;
        }
      } catch(e) {
        document.getElementById('cc-msg').innerHTML = `<span style="color:#ff2d55">${esc(e.message)}</span>`;
      }
    }

    async function exportCartridge() {
      if (!_currentCartridge) return;
      const id = _currentCartridge.id;
      window.open(`/studio/cartridges/${encodeURIComponent(id)}/export`, '_blank');
    }

    async function patchCartridge(updates) {
      if (!_currentCartridge) return;
      const id = _currentCartridge.id;
      const r  = await fetch(`/studio/cartridges/${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(updates),
      });
      if (r.ok) {
        _currentCartridge = await r.json();
        _updateCartridgeInfo();
      }
    }

    // ── File upload (specs) ────────────────────────────────────────────────────

    function makeUploadZone(containerId, label, sublabel) {
      return `
        <div class="upload-zone" id="${containerId}"
             onclick="document.getElementById('fi-${containerId}').click()"
             ondragover="event.preventDefault();this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleSpecDrop(event,'${containerId}')">
          <input type="file" id="fi-${containerId}" accept=".yaml,.yml,.json,.xml,.wsdl"
                 onchange="handleSpecFile(this,'${containerId}')">
          <div class="uz-icon">↑</div>
          <div class="uz-label">${esc(label)}</div>
          <div class="uz-sub">${esc(sublabel)}</div>
          <div id="uz-status-${containerId}" style="margin-top:8px;font-size:10px"></div>
        </div>`;
    }

    async function handleSpecFile(input, zoneId) {
      const file = input.files[0];
      if (!file) return;
      await doUploadSpec(file, zoneId);
    }

    async function handleSpecDrop(event, zoneId) {
      event.preventDefault();
      document.getElementById(zoneId).classList.remove('drag-over');
      const file = event.dataTransfer.files[0];
      if (!file) return;
      await doUploadSpec(file, zoneId);
    }

    async function doUploadSpec(file, zoneId) {
      if (!_currentCartridge) {
        alert('Primero selecciona o crea un cartucho.');
        return;
      }
      const statusEl = document.getElementById(`uz-status-${zoneId}`);
      statusEl.innerHTML = `<span style="color:var(--cyan)">⟳ Subiendo ${esc(file.name)}...</span>`;
      const form = new FormData();
      form.append('file', file);
      try {
        const r = await fetch(`/studio/cartridges/${encodeURIComponent(_currentCartridge.id)}/spec`, {
          method: 'POST', body: form,
        });
        const d = await r.json();
        statusEl.innerHTML = `<span style="color:var(--green)">✓ ${esc(file.name)} subido (${(d.size/1024).toFixed(1)} KB)</span>`;
        // Auto-notify assistant
        document.getElementById('ai-input').value =
          `Acabo de subir el spec "${file.name}". Léelo con infra__minio_read_spec y dime qué ${
            currentStep === 1 ? 'tipo de conexión describe y cómo conectarse' : 'entidades hay disponibles'
          }.`;
        aiSend();
      } catch(e) {
        statusEl.innerHTML = `<span style="color:#ff2d55">Error: ${esc(e.message)}</span>`;
      }
    }

    // ── Navigation ─────────────────────────────────────────────────────────────

    async function goStep(n) {
      currentStep = n;
      aiHistory = [];

      // Update step nav UI
      for (let i = 1; i <= 6; i++) {
        const el = document.getElementById(`si-${i}`);
        if (!el) continue;
        el.classList.toggle('active', i === n);
        el.classList.toggle('done',   i < n);
      }

      // Update AI context badge + hint
      document.getElementById('ai-ctx-badge').textContent = `Paso ${n}: ${STEP_LABELS[n]}`;
      document.getElementById('ai-chat').innerHTML =
        `<div class="ai-hint">${esc(STEP_HINTS[n])}</div>`;
      // Restore saved chat history for this step (if any, within TTL)
      _restoreChatHistory();

      // Render step
      const el = document.getElementById('step-content');
      el.style.padding  = '';   // restore padding (steps 2 & 4 remove it for edge-to-edge layout)
      el.style.overflow = '';
      el.innerHTML = '<div class="loading">Cargando...</div>';
      switch (n) {
        case 1: await renderResumen();  break;
        case 2: renderDagEditor();      break;
        case 3: await renderEntities(); break;
        case 4: await renderRefine();   break;
        case 5: renderAnalytics();      break;
        case 6: await renderSemantic(); break;
        case 7: await renderRAG();      break;
      }
    }

    // ── Step 1: Resumen ───────────────────────────────────────────────────────

    async function renderResumen() {
      const cartridges = _cartridges;
      document.getElementById('step-content').innerHTML = `
        <div class="step-title">
          <div>
            <h2>Resumen</h2>
            <p class="step-desc">Cartuchos registrados. Selecciona uno en el combo para ver sus detalles, o crea uno nuevo con el asistente.</p>
          </div>
        </div>
        ${makeUploadZone('uz-conn', 'Importar cartucho desde ZIP', 'Sube un ZIP exportado previamente para registrarlo en esta instalación')}
        <div class="item-grid" id="cart-grid">
          ${cartridges.length
            ? cartridges.map(c => cartCard(c)).join('')
            : '<div class="empty-card" style="grid-column:1/-1">Sin cartuchos. Usa el asistente para crear uno → describe la conexión al sistema origen.</div>'}
        </div>`;
    }


    function prefillConnConfig(cartridgeId, connId) {
      document.getElementById('ai-input').value =
        `Configura la conexión "${connId}" del cartucho ${cartridgeId}. La URL base es: `;
      document.getElementById('ai-input').focus();
    }

    function cartCard(c) {
      const pattern  = c.pattern || 'dag-based';
      const isDag    = pattern === 'dag-based';
      const entities = c.entities || 0;
      const version  = c.version  || '—';
      const selected = _currentCartridge && _currentCartridge.id === c.id;
      const cls      = selected ? 'ok' : '';
      const patternLabel = isDag ? 'DAG-BASED' : 'FASTAPI-MCP';
      const patternColor = isDag ? 'var(--cyan)' : 'var(--amber)';
      return `
        <div class="item-card ${cls}" onclick="selectCartridge(${escJsArg(c.id)})" style="cursor:pointer">
          <div class="ic-hdr">
            <div class="ic-icon" style="color:${patternColor}">◈</div>
            <div>
              <div class="ic-name">${esc(c.name || c.id)}</div>
              <div class="ic-id">${esc(c.id)} · v${esc(version)}</div>
            </div>
            <div class="ic-status-ok" style="color:${patternColor};font-size:9px">${patternLabel}</div>
          </div>
          <div class="ic-desc">${esc(c.description || '—')}</div>
          <div class="ic-meta">
            <span>${entities} entidades</span>
            ${c.connector ? `<span>conector: ${esc(c.connector)}</span>` : ''}
            <span style="color:var(--text3)">${esc(c.source || '')}</span>
          </div>
          <div style="display:flex;gap:6px;margin-top:10px">
            <button class="btn btn-sm" onclick="event.stopPropagation();selectCartridge(${escJsArg(c.id)});goStep(3)" title="Ver entidades">Entidades →</button>
            <button class="btn btn-sm" onclick="event.stopPropagation();exportCartridge()" title="Exportar ZIP">↓ ZIP</button>
          </div>
        </div>`;
    }

    // ── Step 2: Entidades ──────────────────────────────────────────────────────

    async function renderEntities() {
      const cartridges = _cartridges;

      document.getElementById('step-content').innerHTML = `
        <div class="step-title">
          <div>
            <h2>Entidades &amp; Extractores</h2>
            <p class="step-desc">Entidades definidas en el manifiesto del cartucho. Dispara extracciones individuales o usa el asistente para configurar watermarks y modos.</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn" onclick="loadEntityList()">↺</button>
            <button class="btn" style="color:var(--green);border-color:var(--green)" onclick="showAddEntityRow()">+ Entidad</button>
          </div>
        </div>
        ${makeUploadZone('uz-entity', 'Subir spec de entidades', 'OpenAPI · OData $metadata · WSDL — el asistente extrae las entidades automáticamente')}

        <div id="entity-list-area">
          ${cartridges.length ? '<div class="loading">Cargando entidades...</div>' : '<div class="empty-card">No hay cartuchos. Ve al Paso 1 para crear uno.</div>'}
        </div>
      `;

      if (cartridges.length) loadEntityList();
    }

    // entity → last pipeline_run record
    let _runsByEntity = {};
    // entity → 'extracting' | null  (for polling)
    let _extractingEntities = {};

    async function loadEntityList() {
      const cartridge = _currentCartridge?.id;
      if (!cartridge) return;

      const area = document.getElementById('entity-list-area');
      area.innerHTML = '<div class="loading">Cargando entidades...</div>';

      try {
        // Fetch entities + pipeline_runs + DAG list in parallel
        const [semRes, runsRes, dagRes] = await Promise.all([
          fetch(`/api/semantic?cartridge=${encodeURIComponent(cartridge)}`),
          fetch(`/api/pipeline_runs?cartridge=${encodeURIComponent(cartridge)}&limit=200`).catch(() => null),
          fetch('/mcp/invoke', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ server: 'infra', tool: 'airflow_list_dags', args: {} }),
          }).catch(() => null),
        ]);

        const d        = await semRes.json();
        const raw      = d.entities || {};
        const entities = Array.isArray(raw) ? raw : (raw.entities || []);

        if (!entities.length) {
          area.innerHTML = '<div class="empty-card">Sin entidades registradas en este cartucho.</div>';
          return;
        }

        // Build last-run map (most recent per entity — API returns DESC so first = latest)
        _runsByEntity = {};
        if (runsRes?.ok) {
          const runsData = await runsRes.json();
          for (const run of (runsData.runs || [])) {
            if (!_runsByEntity[run.entity]) _runsByEntity[run.entity] = run;
          }
        }

        // DAG list
        let dagOptions = [];
        if (dagRes?.ok) {
          const dagData = await dagRes.json();
          dagOptions = (dagData.result?.dags || [])
            .map(d => d.dag_id)
            .filter(id => id.startsWith(cartridge + '_'))
            .sort();
        }

        area.innerHTML = `
          <div class="et-table">
            <div class="et-hdr">
              <span>ENTIDAD</span>
              <span>DISPLAY NAME</span>
              <span>MODO</span>
              <span>DAG</span>
              <span>ACCIÓN</span>
            </div>
            ${entities.map(e => renderEntityRow(e, cartridge, dagOptions)).join('')}
          </div>`;
      } catch(e) {
        area.innerHTML = `<div class="empty-card" style="color:#ff2d55">Error: ${esc(e.message)}</div>`;
      }
    }

    function renderEntityRow(e, cartridge, dagOptions) {
      const name        = esc(e.entity || e.id || e.name || '?');
      const rawName     = e.entity || e.id || e.name || '';
      const modeRaw     = e.mode || 'full';
      const dagRaw      = e.dag_id || '';
      const displayRaw  = e.display_name || '';
      const triggerType = e.trigger_type || 'manual';
      const cronRaw     = e.cron_expression || '';
      const isScheduled = triggerType === 'scheduled';

      // Run status badge
      const run = _runsByEntity[rawName];
      const isExtracting = !!_extractingEntities[rawName];
      let runBadgeHtml = '';
      if (isExtracting) {
        runBadgeHtml = `<div class="run-badge"><span class="run-dot-run">●</span><span style="color:var(--cyan)">extrayendo...</span></div>`;
      } else if (run) {
        const ok    = run.status === 'success';
        const dot   = ok ? 'run-dot-ok' : 'run-dot-fail';
        const sym   = ok ? '✓' : '✗';
        const date  = (run.finished_at || run.started_at || '').substring(0, 10);
        const recs  = run.record_count != null ? ` · ${Number(run.record_count).toLocaleString('es')} rows` : '';
        const errTip = !ok && run.error_message ? ` title="${esc(run.error_message)}"` : '';
        runBadgeHtml = `<div class="run-badge"${errTip}><span class="${dot}">${sym}</span><span style="color:var(--text3)">${esc(date)}${recs}</span></div>`;
      } else {
        runBadgeHtml = `<div class="run-badge"><span class="run-dot-never">○</span><span style="color:var(--text3)">sin ejecución</span></div>`;
      }

      // Display name input
      const displayInput = `

    async function patchEntityField(cartridge, entity, field, value, el) {
      const prev = el.dataset.prev ?? (el.tagName === 'SELECT' ? el.value : el.defaultValue);
      el.dataset.prev = value;
      el.style.borderColor = 'var(--cyan)';
      try {
        const r = await fetch(
          `/studio/cartridges/${encodeURIComponent(cartridge)}/entities/${encodeURIComponent(entity)}`,
          {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({[field]: value}),
          }
        );
        if (r.ok) {
          el.style.borderColor = 'var(--green)';
          setTimeout(() => { el.style.borderColor = ''; }, 1400);
          if (_currentCartridge?.entities) {
            const ent = _currentCartridge.entities.find(e => (e.id || e.entity) === entity);
            if (ent) ent[field] = value;
          }
        } else {
          if (el.tagName === 'SELECT') el.value = prev; else el.value = prev;
          el.style.borderColor = '#ff2d55';
        }
      } catch(e) {
        if (el.tagName === 'SELECT') el.value = prev; else el.value = prev;
        el.style.borderColor = '#ff2d55';
      }
    }

    async function renameEntity(cartridge, entity) {
      const newName = prompt(`Nuevo nombre para la entidad "${entity}":`, entity);
      if (!newName || newName.trim() === entity) return;
      try {
        const r = await fetch(
          `/studio/cartridges/${encodeURIComponent(cartridge)}/entities/${encodeURIComponent(entity)}/rename`,
          {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ new_name: newName.trim() }),
          }
        );
        const d = await r.json();
        if (!r.ok) { alert(`Error: ${d.detail || JSON.stringify(d)}`); return; }
        loadEntityList();   // refresh — new name appears, old is gone
      } catch(e) { alert(`Error: ${e.message}`); }
    }

    function updateEntityConn(cartridge, entity, val, el) {

    async function toggleEntitySchedule(cartridge, entity, currentType, currentCron) {
      if (currentType === 'scheduled') {
        // Switch to manual — clear schedule in Airflow
        if (!confirm(`¿Desactivar el schedule de ${entity} y dejarlo en manual?`)) return;
        await _setEntitySchedule(cartridge, entity, 'manual', null);
      } else {
        // Ask for cron expression
        const cron = prompt(
          `Cron expression para ${entity}:\n` +
          `Ejemplos:\n  0 6 * * 1   → cada lunes 6am\n  0 2 * * *   → diario 2am\n  0 0 1 * *   → mensual`,
          currentCron || '0 6 * * 1'
        );
        if (!cron) return;
        await _setEntitySchedule(cartridge, entity, 'scheduled', cron.trim());
      }
      loadEntityList(); // refresh
    }

    async function _setEntitySchedule(cartridge, entity, triggerType, cronExpression) {
      // 1. Persist in entity_config
      await fetch(
        `/studio/cartridges/${encodeURIComponent(cartridge)}/entities/${encodeURIComponent(entity)}`,
        {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ trigger_type: triggerType, cron_expression: cronExpression }),
        }
      );
      // 2. Update Airflow DAG schedule via MCP infra
      const dagId = ((_currentCartridge?.entities || [])
        .find(e => (e.entity || e.id) === entity) || {}).dag_id || '';
      if (dagId) {
        await fetch('/mcp/invoke', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            server: 'infra',
            tool: triggerType === 'scheduled' ? 'airflow_unpause_dag' : 'airflow_pause_dag',
            args: { dag_id: dagId },
          }),
        }).catch(() => {});
        // If scheduled, also set the cron via variable so the DAG can read it on next parse
        if (triggerType === 'scheduled' && cronExpression) {
          await fetch('/mcp/invoke', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              server: 'infra',
              tool: 'airflow_set_variable',
              args: { key: `${entity.toLowerCase()}_schedule`, value: cronExpression },
            }),
          }).catch(() => {});
        }
      }
    }

    async function extractNow(cartridge, entity, mode, dagId) {
      dagId = dagId || `${cartridge}_extract`;  // fallback if none assigned
      const safeId = entity.replace(/\W/g,'_');
      const btn    = document.getElementById(`ebtn-${safeId}`);
      const row    = document.getElementById(`erow-${safeId}`);

      _extractingEntities[entity] = true;
      if (btn) { btn.textContent = '⟳ ...'; btn.disabled = true; btn.style.color = 'var(--cyan)'; }
      _updateRunBadge(row, entity, 'extracting');

      try {
        const r = await fetch('/mcp/invoke', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            server: 'infra', tool: 'airflow_trigger_dag',
            args: { dag_id: dagId, conf: { entity, mode: mode || 'incremental' } },
          }),
        });
        const d    = await r.json();
        const runId = (d.result || d).dag_run_id || (d.result || d).run_id;
        if (!runId) throw new Error(JSON.stringify(d));

        // Poll pipeline_runs + Airflow run state in parallel
        _pollExtraction(cartridge, entity, safeId, dagId, runId);
      } catch(e) {
        delete _extractingEntities[entity];
        if (btn) { btn.textContent = '► Extraer'; btn.disabled = false; btn.style.color = ''; }
        _updateRunBadge(row, entity, 'error', e.message);
      }
    }

    async function _pollExtraction(cartridge, entity, safeId, dagId, runId) {
      const since = new Date().toISOString();
      const btn   = document.getElementById(`ebtn-${safeId}`);
      const row   = document.getElementById(`erow-${safeId}`);
      let tries   = 0;
      const MAX   = 60;  // ~5 min

      const _resetBtn = () => {
        delete _extractingEntities[entity];
        if (btn) { btn.textContent = '► Extraer'; btn.disabled = false; btn.style.color = ''; }
      };

      while (tries++ < MAX) {
        await new Promise(res => setTimeout(res, 5000));

        // ── Check Airflow run state (fast path for failures) ──────────────────
        if (dagId && runId) {
          try {
            const ar = await fetch('/mcp/invoke', {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({ server: 'infra', tool: 'airflow_get_run_status',
                                     args: { dag_id: dagId, dag_run_id: runId } }),
            });
            if (ar.ok) {
              const ad = await ar.json();
              const state = (ad.result || ad).state;
              if (state === 'failed') {
                _resetBtn();
                _updateRunBadge(row, entity, 'fail', { error_message: 'DAG failed — ver logs ↓' });
                await _showAirflowErrorLogs(safeId, dagId, runId, entity, cartridge);
                return;
              }
              if (state === 'success') {
                // Pipeline_run record may not yet be written — wait one more cycle
              }
            }
          } catch(_) {}
        }

        // ── Check pipeline_runs table ────────────────────────────────────────
        try {
          const r = await fetch(`/api/pipeline_runs?cartridge=${encodeURIComponent(cartridge)}&entity=${encodeURIComponent(entity)}&limit=1`);
          if (!r.ok) continue;
          const d   = await r.json();
          const run = (d.runs || [])[0];
          const isNew = run && run.status !== 'running' && (
            !run.started_at ||
            run.started_at >= since ||
            run.run_id !== (_runsByEntity[entity]?.run_id)
          );
          if (isNew) {
            _runsByEntity[entity] = run;
            _resetBtn();
            _updateRunBadge(row, entity, run.status === 'success' ? 'ok' : 'fail', run);
            return;
          }
        } catch(_) {}
      }
      // Timeout — stop polling
      _resetBtn();
      _updateRunBadge(row, entity, 'fail', { error_message: 'timeout — revisar Airflow' });
    }

    async function _showAirflowErrorLogs(safeId, dagId, runId, entity, cartridge) {
      const panel = document.getElementById(`elogs-${safeId}`);
      if (!panel) return;
      panel.style.display = '';
      panel.innerHTML = `<div class="et-preview-inner" style="color:var(--text3);font-size:11px">Cargando logs de Airflow...</div>`;

      try {
        // List task instances to find the failed one
        const ti = await fetch('/mcp/invoke', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ server: 'infra', tool: 'airflow_list_task_instances',
                                 args: { dag_id: dagId, dag_run_id: runId } }),
        });
        const tid = await ti.json();
        const tasks = (tid.result || tid).task_instances || [];
        const failed = tasks.find(t => t.state === 'failed') || tasks[0];
        const taskId = failed?.task_id || 'ingest';

        // Get logs for the failed task
        const lr = await fetch('/mcp/invoke', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ server: 'infra', tool: 'airflow_get_task_logs',
                                 args: { dag_id: dagId, dag_run_id: runId, task_id: taskId } }),
        });
        const ld = await lr.json();
        const logs = (ld.result || ld).content || ld.logs || JSON.stringify(ld);

        const airflowUrl = `http://localhost:8082/dags/${encodeURIComponent(dagId)}/grid`;
        const prompt = [
          `Analiza el fallo del DAG **${dagId}** para la entidad **${entity}** del cartucho **${cartridge}**.`,
          ``,
          `**Tarea fallida:** ${taskId}`,
          `**Run ID:** ${runId}`,
          logs ? `**Logs Airflow:**\n\`\`\`\n${logs.slice(-3000)}\n\`\`\`` : '',
          ``,
          `Identifica la causa raíz y propón la corrección.`,
        ].filter(Boolean).join('\n');

        panel.innerHTML = `<div class="et-preview-inner">
          <div class="preview-stats">
            <div class="preview-stat">Estado: <span style="color:#ff2d55">failed</span></div>
            <div class="preview-stat">DAG: <span>${esc(dagId)}</span></div>
            <div class="preview-stat">Tarea: <span>${esc(taskId)}</span></div>
            <div class="preview-stat">Run ID: <span style="font-size:9px">${esc(runId)}</span></div>
          </div>
          <div style="margin-bottom:10px">
            <div style="font-size:9px;color:var(--text3);font-family:var(--font-ui);font-weight:600;margin-bottom:4px">
              AIRFLOW LOGS <span style="font-weight:normal">(últimas líneas)</span>
            </div>
            <pre style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;
                        font-family:var(--font-mono);font-size:9px;color:var(--text2);
                        max-height:220px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin:0">${esc(logs.slice(-3000))}</pre>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sm" style="color:var(--cyan);border-color:var(--cyan)"
                    onclick="sendLogsToAssistant(${JSON.stringify(prompt).replace(/</g,'\\u003c').replace(/"/g,'&quot;')})">
              ✎ Analizar con Asistente
            </button>
            <a href="${esc(airflowUrl)}" target="_blank" class="btn btn-sm"
               style="color:var(--amber);border-color:var(--amber);text-decoration:none">
              ◈ Ver en Airflow
            </a>
          </div>
        </div>`;
      } catch(e) {
        panel.innerHTML = `<div class="et-preview-inner">
          <div class="preview-err">No se pudieron cargar los logs: ${esc(e.message)}</div>
          <a href="http://localhost:8082/dags/${encodeURIComponent(dagId)}/grid" target="_blank"
             class="btn btn-sm" style="color:var(--amber);border-color:var(--amber);text-decoration:none;margin-top:8px">
            ◈ Ver en Airflow
          </a>
        </div>`;
      }
    }

    function _updateRunBadge(row, entity, state, data) {
      if (!row) return;
      const badgeEl = row.querySelector('.run-badge');
      if (!badgeEl) return;
      if (state === 'extracting') {
        badgeEl.outerHTML = `<div class="run-badge"><span class="run-dot-run">●</span><span style="color:var(--cyan)">extrayendo...</span></div>`;
      } else if (state === 'ok' && data) {
        const date  = (data.finished_at || data.started_at || '').substring(0,10);
        const recs  = data.record_count != null ? ` · ${Number(data.record_count).toLocaleString('es')} rows` : '';
        badgeEl.outerHTML = `<div class="run-badge"><span class="run-dot-ok">✓</span><span style="color:var(--text3)">${esc(date)}${recs}</span></div>`;
      } else if (state === 'fail' && data) {
        const err = typeof data === 'string' ? data : (data.error_message || 'failed');
        const safeId = entity.replace(/\W/g,'_');
        badgeEl.outerHTML = `<div class="run-badge" title="${esc(err)}" style="cursor:pointer"
          onclick="document.getElementById('elogs-${safeId}').style.display === 'none' ? document.getElementById('elogs-${safeId}').style.display='' : document.getElementById('elogs-${safeId}').style.display='none'">
          <span class="run-dot-fail">✗</span><span style="color:#ff2d55">error ↕</span></div>`;
      } else if (state === 'error') {
        const msg = typeof data === 'string' ? data : 'error al disparar';
        badgeEl.outerHTML = `<div class="run-badge" title="${esc(msg)}"><span class="run-dot-fail">✗</span><span style="color:#ff2d55">no iniciado</span></div>`;
      }
    }
