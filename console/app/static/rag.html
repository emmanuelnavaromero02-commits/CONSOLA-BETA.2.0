<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MODecissions · RAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    html, body { overflow: hidden; height: 100%; margin: 0; }

    /* ── Header ── */
    .rag-header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 44px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rag-logo { font-family: var(--font-ui); font-size: 13px; font-weight: 700; color: var(--green); white-space: nowrap; }
    .rag-logo .accent { color: var(--amber); }
    .rag-badge { font-size: 9px; color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 2px; font-family: var(--font-mono); }
    .rag-nav { display: flex; gap: 6px; margin-left: auto; }
    .hdr-lnk {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text3); text-decoration: none;
      padding: 3px 10px; border: 1px solid var(--border); border-radius: 2px;
      transition: color .15s, border-color .15s;
    }
    .hdr-lnk:hover { color: var(--green); border-color: var(--green); }

    /* ── Layout ── */
    .rag-layout {
      display: flex; height: calc(100vh - 44px);
    }

    /* ── Left: sources panel ── */
    .sources-panel {
      width: 320px; min-width: 260px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }
    .panel-header {
      padding: 10px 14px 8px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      color: var(--text3); letter-spacing: .08em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header .ph-count {
      margin-left: auto;
      background: var(--bg2); color: var(--green);
      padding: 1px 6px; border-radius: 2px; font-size: 9px;
    }
    .sources-list {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }
    .source-item {
      padding: 8px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .source-item:hover { background: var(--bg2); }
    .source-item.active { background: var(--bg2); border-left: 2px solid var(--green); }
    .source-info { flex: 1; min-width: 0; }
    .source-name {
      font-family: var(--font-mono); font-size: 11px; color: var(--text1);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .source-meta {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      margin-top: 2px;
    }
    .source-del {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 13px; padding: 0 2px;
      transition: color .15s; flex-shrink: 0; line-height: 1;
    }
    .source-del:hover { color: #e05c5c; }

    /* ── Ingest form ── */
    .ingest-section {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
    }
    .ingest-title {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      color: var(--text3); letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ingest-row { margin-bottom: 6px; }
    .ingest-label {
      display: block; font-family: var(--font-mono); font-size: 9px;
      color: var(--text3); margin-bottom: 3px;
    }
    .ingest-input, .ingest-textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text1); font-family: var(--font-mono); font-size: 11px;
      padding: 5px 8px; border-radius: 2px; outline: none;
      transition: border-color .15s;
    }
    .ingest-input:focus, .ingest-textarea:focus { border-color: var(--green); }
    .ingest-textarea { resize: vertical; min-height: 80px; max-height: 200px; }
    .file-row {
      display: flex; gap: 6px; align-items: center;
    }
    .file-label {
      flex: 1; display: flex; align-items: center; gap: 6px;
      border: 1px dashed var(--border); border-radius: 2px;
      padding: 5px 8px; cursor: pointer;
      font-family: var(--font-mono); font-size: 10px; color: var(--text3);
      transition: border-color .15s, color .15s;
    }
    .file-label:hover { border-color: var(--green); color: var(--green); }
    .file-label.has-file { border-color: var(--amber); color: var(--amber); }
    #fileInput { display: none; }
    .btn {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      padding: 5px 14px; border-radius: 2px; cursor: pointer;
      border: 1px solid; transition: all .15s;
      letter-spacing: .04em;
    }
    .btn-green {
      background: none; color: var(--green); border-color: var(--green);
    }
    .btn-green:hover { background: var(--green); color: var(--bg); }
    .btn-green:disabled { opacity: .4; cursor: not-allowed; }
    .ingest-btn { width: 100%; margin-top: 6px; }
    .ingest-status {
      font-family: var(--font-mono); font-size: 10px;
      margin-top: 6px; min-height: 16px;
    }
    .ok  { color: var(--green); }
    .err { color: #e05c5c; }
    .dim { color: var(--text3); }

    /* ── Right: search panel ── */
    .search-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .search-bar {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg2); display: flex; gap: 8px; align-items: center;
    }
    .search-input {
      flex: 1;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text1); font-family: var(--font-mono); font-size: 12px;
      padding: 6px 10px; border-radius: 2px; outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--green); }
    .topk-select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text3); font-family: var(--font-mono); font-size: 10px;
      padding: 6px 8px; border-radius: 2px; outline: none; cursor: pointer;
      width: 80px;
    }
    .search-filter {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      padding: 0 4px; white-space: nowrap;
    }

    /* ── Results ── */
    .results-area {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .results-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      font-family: var(--font-mono); color: var(--text3); font-size: 12px;
      gap: 8px;
    }
    .results-empty .hint { font-size: 10px; opacity: .6; }
    .result-card {
      border: 1px solid var(--border); border-radius: 3px;
      background: var(--bg2); overflow: hidden;
    }
    .result-card-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .result-card-hdr:hover { background: var(--bg); }
    .result-rank {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      color: var(--bg); background: var(--green);
      padding: 1px 6px; border-radius: 2px; flex-shrink: 0;
    }
    .result-source {
      font-family: var(--font-mono); font-size: 10px; color: var(--amber);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .result-score {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      flex-shrink: 0;
    }
    .result-toggle {
      font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform .2s;
    }
    .result-card.open .result-toggle { transform: rotate(180deg); }
    .result-body {
      display: none; padding: 10px 12px;
    }
    .result-card.open .result-body { display: block; }
    .result-match-lbl {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .result-match {
      font-family: var(--font-mono); font-size: 10px; color: var(--cyan);
      background: var(--bg); padding: 6px 8px; border-radius: 2px;
      border-left: 2px solid var(--cyan);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 8px;
    }
    .result-ctx-lbl {
      font-family: var(--font-mono); font-size: 9px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .result-ctx {
      font-family: var(--font-mono); font-size: 10px; color: var(--text2);
      background: var(--bg); padding: 8px 10px; border-radius: 2px;
      white-space: pre-wrap; word-break: break-word; max-height: 280px; overflow-y: auto;
      line-height: 1.5;
    }
    .result-copy-btn {
      margin-top: 6px;
    }

    /* ── Copy-all bar ── */
    .copy-bar {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      background: var(--bg2);
      display: none;
      align-items: center; gap: 10px;
    }
    .copy-bar.visible { display: flex; }
    .copy-bar-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); flex: 1; }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div style="display:flex;flex-direction:column;height:100vh;">

  <!-- Header -->
  <header class="rag-header">
    <div class="rag-logo">MO<span class="accent">D</span>ecissions</div>
    <div class="rag-badge">RAG</div>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3);">Knowledge Base · Semantic Search</span>
    <nav class="rag-nav">
      <a href="/" class="hdr-lnk">← Console</a>
      <a href="/studio" class="hdr-lnk">Studio</a>
      <a href="/monitor" class="hdr-lnk">Monitor</a>
    </nav>
  </header>

  <!-- Body -->
  <div class="rag-layout">

    <!-- Left: Sources + Ingest -->
    <aside class="sources-panel">
      <div class="panel-header">
        Sources
        <span class="ph-count" id="srcCount">0</span>
      </div>

      <div class="sources-list" id="sourcesList">
        <div style="padding:20px 14px;font-family:var(--font-mono);font-size:10px;color:var(--text3);">
          Loading…
        </div>
      </div>

      <!-- Ingest form -->
      <div class="ingest-section">
        <div class="ingest-title">+ Ingest Document</div>

        <div class="ingest-row">
          <label class="ingest-label">Name (unique)</label>
          <input class="ingest-input" id="inName" type="text" placeholder="e.g. Q1_report_2025">
        </div>

        <div class="ingest-row">
          <label class="ingest-label">Description (optional)</label>
          <input class="ingest-input" id="inDesc" type="text" placeholder="Brief description">
        </div>

        <div class="ingest-row">
          <label class="ingest-label">Content</label>
          <textarea class="ingest-textarea" id="inContent"
            placeholder="Paste text here, or load a file below (.txt, .md, .pdf)…"></textarea>
        </div>

        <div class="file-row">
          <label class="file-label" id="fileLabel" for="fileInput">
            📄 <span id="fileLabelText">Load file…</span>
          </label>
          <input type="file" id="fileInput" accept=".txt,.md,.csv,.pdf">
        </div>

        <button class="btn btn-green ingest-btn" id="ingestBtn" onclick="doIngest()">INGEST</button>
        <div class="ingest-status" id="ingestStatus"></div>
      </div>
    </aside>

    <!-- Right: Search -->
    <main class="search-panel">
      <div class="search-bar">
        <input class="search-input" id="searchInput"
          placeholder="Search the knowledge base…"
          onkeydown="if(event.key==='Enter')doSearch()">
        <span class="search-filter" id="filterLabel"></span>
        <select class="topk-select" id="topK">
          <option value="3">top 3</option>
          <option value="5" selected>top 5</option>
          <option value="10">top 10</option>
        </select>
        <button class="btn btn-green" onclick="doSearch()">SEARCH</button>
      </div>

      <div class="results-area" id="resultsArea">
        <div class="results-empty" id="emptyState">
          <div>[ RAG Knowledge Base ]</div>
          <div class="hint">Ingest documents on the left, then search here.</div>
          <div class="hint">The assistant can also call search_rag automatically.</div>
        </div>
      </div>

      <div class="copy-bar" id="copyBar">
        <span class="copy-bar-label" id="copyBarLabel">Results ready</span>
        <button class="btn btn-green" onclick="copyAllContext()">COPY CONTEXT</button>
      </div>
    </main>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let sources = [];
let selectedSourceIds = [];  // empty = all
let lastResults = [];

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  await loadSources();
  document.getElementById('fileInput').addEventListener('change', onFileChange);
})();

// ── Sources ───────────────────────────────────────────────────────────────────
async function loadSources() {
  try {
    const r = await fetch('/api/rag/sources');
    const data = await r.json();
    sources = data.sources || [];
    renderSources();
  } catch(e) {
    document.getElementById('sourcesList').innerHTML =
      `<div style="padding:14px;font-family:var(--font-mono);font-size:10px;color:#e05c5c;">
        RAG service not available.<br>Check that the rag container is running.
       </div>`;
  }
}

function renderSources() {
  const el = document.getElementById('sourcesList');
  document.getElementById('srcCount').textContent = sources.length;
  if (!sources.length) {
    el.innerHTML = `<div style="padding:20px 14px;font-family:var(--font-mono);font-size:10px;color:var(--text3);">
      No documents ingested yet.
    </div>`;
    return;
  }
  el.innerHTML = sources.map(s => {
    const active = selectedSourceIds.includes(s.id) ? 'active' : '';
    const sourceId = Number(s.id);
    const chunks = s.chunk_count ? `${Number(s.chunk_count).toLocaleString()} chunks` : '';
    const date   = (s.created_at || '').slice(0, 10);
    return `<div class="source-item ${active}" onclick="toggleSource(${sourceId})" data-id="${sourceId}">
      <div class="source-info">
        <div class="source-name" title="${esc(s.name)}">${esc(s.name)}</div>
        <div class="source-meta">${esc(chunks)}${chunks && date ? ' · ' : ''}${esc(date)}</div>
        ${s.description ? `<div class="source-meta" style="color:var(--text2)">${esc(s.description)}</div>` : ''}
      </div>
      <button class="source-del" onclick="delSource(event,${sourceId})" title="Delete">✕</button>
    </div>`;
  }).join('');
  updateFilterLabel();
}

function toggleSource(id) {
  const idx = selectedSourceIds.indexOf(id);
  if (idx === -1) selectedSourceIds.push(id);
  else selectedSourceIds.splice(idx, 1);
  renderSources();
}

function updateFilterLabel() {
  const el = document.getElementById('filterLabel');
  if (!selectedSourceIds.length) { el.textContent = ''; return; }
  const names = sources
    .filter(s => selectedSourceIds.includes(s.id))
    .map(s => s.name).join(', ');
  el.textContent = `Filter: ${names}`;
}

async function delSource(e, id) {
  e.stopPropagation();
  const src = sources.find(s => s.id === id);
  if (!confirm(`Delete "${src?.name}"? All chunks will be removed.`)) return;
  try {
    await fetch(`/api/rag/sources/${id}`, { method: 'DELETE' });
    selectedSourceIds = selectedSourceIds.filter(x => x !== id);
    await loadSources();
  } catch(err) {
    alert('Delete failed: ' + err.message);
  }
}

// ── File loading ──────────────────────────────────────────────────────────────
let pendingFileData = null;  // {content, mime_type}

async function onFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const label = document.getElementById('fileLabel');
  const labelText = document.getElementById('fileLabelText');

  labelText.textContent = file.name;
  label.classList.add('has-file');

  if (!document.getElementById('inName').value) {
    document.getElementById('inName').value = file.name.replace(/\.[^.]+$/, '');
  }

  const mime = file.type || 'text/plain';
  if (mime === 'application/pdf' || file.name.endsWith('.pdf')) {
    const buf = await file.arrayBuffer();
    const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
    pendingFileData = { content: b64, mime_type: 'application/pdf' };
    document.getElementById('inContent').value = '[PDF — will be extracted server-side]';
    document.getElementById('inContent').disabled = true;
  } else {
    const text = await file.text();
    document.getElementById('inContent').value = text;
    document.getElementById('inContent').disabled = false;
    pendingFileData = null;
  }
}

// ── Ingest ────────────────────────────────────────────────────────────────────
async function doIngest() {
  const name    = document.getElementById('inName').value.trim();
  const desc    = document.getElementById('inDesc').value.trim();
  const content = document.getElementById('inContent').value.trim();
  const status  = document.getElementById('ingestStatus');
  const btn     = document.getElementById('ingestBtn');

  if (!name) { status.innerHTML = '<span class="err">Name is required.</span>'; return; }
  if (!content && !pendingFileData) { status.innerHTML = '<span class="err">Content is required.</span>'; return; }

  btn.disabled = true;
  status.innerHTML = '<span class="dim"><span class="spinner"></span> Embedding chunks…</span>';

  try {
    const body = pendingFileData
      ? { name, description: desc, ...pendingFileData }
      : { name, description: desc, content, mime_type: 'text/plain' };

    const r = await fetch('/api/rag/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    const data = await r.json();
    status.innerHTML = `<span class="ok">✓ Ingested: ${Number(data.parents || 0).toLocaleString()} parents, ${Number(data.children || 0).toLocaleString()} child chunks.</span>`;
    document.getElementById('inName').value = '';
    document.getElementById('inDesc').value = '';
    document.getElementById('inContent').value = '';
    document.getElementById('inContent').disabled = false;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileLabelText').textContent = 'Load file…';
    document.getElementById('fileLabel').classList.remove('has-file');
    pendingFileData = null;
    await loadSources();
  } catch(err) {
    status.innerHTML = `<span class="err">✗ ${esc(err.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const topK  = parseInt(document.getElementById('topK').value, 10);
  const area  = document.getElementById('resultsArea');
  const bar   = document.getElementById('copyBar');

  area.innerHTML = `<div class="results-empty"><span class="spinner"></span></div>`;
  bar.classList.remove('visible');

  try {
    const body = { query, top_k: topK };
    if (selectedSourceIds.length) body.source_ids = selectedSourceIds;

    const r = await fetch('/api/rag/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
    const data = await r.json();
    lastResults = data.results || [];
    renderResults(lastResults, query);
  } catch(err) {
    area.innerHTML = `<div class="results-empty"><span class="err">✗ ${esc(err.message)}</span></div>`;
  }
}

function renderResults(results, query) {
  const area = document.getElementById('resultsArea');
  const bar  = document.getElementById('copyBar');

  if (!results.length) {
    area.innerHTML = `<div class="results-empty">
      No results found.<br><span class="hint">Try a different query or ingest more documents.</span>
    </div>`;
    bar.classList.remove('visible');
    return;
  }

  area.innerHTML = results.map((r, i) => {
    const pct = Math.round(r.similarity * 100);
    const scoreColor = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--text3)';
    return `<div class="result-card" id="rc${i}">
      <div class="result-card-hdr" onclick="toggleCard(${i})">
        <span class="result-rank">${i + 1}</span>
        <span class="result-source">${esc(r.source_name)}</span>
        <span class="result-score" style="color:${scoreColor}">${pct}% match</span>
        <span class="result-toggle">▼</span>
      </div>
      <div class="result-body">
        <div class="result-match-lbl">Matched segment</div>
        <div class="result-match">${esc(r.child_content)}</div>
        <div class="result-ctx-lbl">Parent context (sent to LLM)</div>
        <div class="result-ctx">${esc(r.context)}</div>
        <button class="btn btn-green result-copy-btn" onclick="copyCtx(${i})">COPY CONTEXT</button>
      </div>
    </div>`;
  }).join('');

  // Auto-open top result
  toggleCard(0);

  document.getElementById('copyBarLabel').textContent =
    `${results.length} result${results.length !== 1 ? 's' : ''} · query: "${query}"`;
  bar.classList.add('visible');
}

function toggleCard(i) {
  const card = document.getElementById(`rc${i}`);
  if (card) card.classList.toggle('open');
}

function copyCtx(i) {
  const r = lastResults[i];
  if (!r) return;
  navigator.clipboard.writeText(r.context).then(() => {
    const btn = document.querySelectorAll('.result-copy-btn')[i];
    if (btn) { btn.textContent = 'COPIED!'; setTimeout(() => btn.textContent = 'COPY CONTEXT', 1500); }
  });
}

function copyAllContext() {
  if (!lastResults.length) return;
  const text = lastResults.map((r, i) =>
    `## Context ${i + 1} — ${r.source_name} (${Math.round(r.similarity * 100)}% match)\n\n${r.context}`
  ).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-bar .btn');
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY CONTEXT', 1500);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
