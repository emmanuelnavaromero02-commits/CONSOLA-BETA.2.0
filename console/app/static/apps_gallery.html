<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apps Analíticas — MODecissions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { padding: 0; margin: 0; }
    .gallery-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .gallery-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .gallery-header a {
      font-size: 10px;
      color: var(--text3);
      text-decoration: none;
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }
    .gallery-header a:hover { color: var(--green); }
    .gallery-title {
      font-family: var(--font-pixel);
      font-size: 13px;
      color: #7c9fff;
      letter-spacing: 3px;
    }
    .gallery-subtitle {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .app-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .15s;
    }
    .app-card:hover {
      border-color: #7c9fff;
      transform: translateY(-2px);
    }
    .app-card-icon { font-size: 20px; color: #7c9fff; }
    .app-card-title {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text1);
      letter-spacing: 1px;
    }
    .app-card-desc {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.7;
      flex: 1;
    }
    .app-card-meta {
      font-size: 9px;
      color: var(--text3);
      font-family: var(--font-mono);
    }
    .app-card-btn {
      display: inline-block;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid #7c9fff;
      border-radius: 4px;
      color: #7c9fff;
      font-size: 10px;
      font-family: var(--font-mono);
      text-decoration: none;
      text-align: center;
      transition: background .2s;
    }
    .app-card-btn:hover { background: rgba(124,159,255,.1); }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
      font-size: 11px;
      line-height: 2;
    }
    .empty-icon { font-size: 36px; margin-bottom: 16px; opacity: .4; }
    .loading-line {
      font-size: 10px;
      color: var(--text3);
      font-family: var(--font-mono);
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="scanlines"></div>

  <div class="gallery-shell">
    <div class="gallery-header">
      <a href="/">← INICIO</a>
      <div>
        <div class="gallery-title">▦ APPS ANALÍTICAS</div>
        <div class="gallery-subtitle">APLICACIONES GENERADAS POR IA · DATOS EN TIEMPO REAL</div>
      </div>
    </div>

    <div id="apps-container">
      <div class="loading-line">Cargando aplicaciones...</div>
    </div>
  </div>

  <script>
    document.documentElement.dataset.theme = localStorage.getItem('mod-theme') || 'dark';

    async function loadApps() {
      const container = document.getElementById('apps-container');
      try {
        const r = await fetch('/api/apps');
        const d = await r.json();
        const apps = d.apps || [];

        if (!apps.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">▦</div>
              <div>No hay aplicaciones publicadas aún.</div>
              <div>Pídele al asistente en Monitor que genere una app analítica.</div>
              <div style="margin-top:16px;font-family:var(--font-mono);font-size:9px;color:var(--text3)">
                Ejemplo: "Genera una app de P&amp;L por Revenue Manager con los datos de pnl_mensual"
              </div>
            </div>`;
          return;
        }

        container.innerHTML = `<div class="apps-grid">${apps.map(app => `
          <div class="app-card" id="card-${escHtml(app.name)}">
            <div class="app-card-icon">▦</div>
            <div class="app-card-title">${escHtml(app.title)}</div>
            <div class="app-card-desc">${escHtml(app.description || '—')}</div>
            <div class="app-card-meta">Actualizado: ${escHtml(app.updated_at ? app.updated_at.slice(0,16).replace('T',' ') : '—')}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <a class="app-card-btn" href="/apps/${encodeURIComponent(app.name || '')}" target="_blank" style="flex:1">→ ABRIR APP</a>
              <button class="app-card-btn" title="Eliminar aplicación" onclick="deleteApp(${escJsArg(app.name)}, ${escJsArg(app.title)})"
                      style="background:transparent;border-color:#c44;color:#c44;cursor:pointer;padding:6px 10px">🗑</button>
            </div>
          </div>
        `).join('')}</div>`;
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><div>Error cargando apps: ${escHtml(e.message)}</div></div>`;
      }
    }

    async function deleteApp(name, title) {
      if (!confirm(`¿Eliminar la aplicación "${title}"?\n\nEsto no se puede deshacer.`)) return;
      try {
        const r = await fetch('/api/apps/' + encodeURIComponent(name), {method: 'DELETE'});
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          alert('Error eliminando: ' + (d.detail || r.statusText));
          return;
        }
        await loadApps();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function escJsArg(s) {
      return JSON.stringify(String(s ?? '')).replace(/</g, '\\u003c').replace(/>/g, '\\u003e').replace(/&/g, '\\u0026');
    }

    loadApps();
  </script>
</body>
</html>
