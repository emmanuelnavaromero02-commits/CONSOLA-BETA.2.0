<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar password — MODecissions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { padding: 0; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { width: 420px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 36px 32px; }
    .brand { font-size: 22px; color: var(--green); letter-spacing: 2px; text-align: center; font-weight: 700; }
    .brand .accent { color: var(--amber); }
    .tagline { text-align: center; font-size: 9px; color: var(--text3); letter-spacing: 2px; margin-top: 6px; margin-bottom: 22px; }
    h2 { font-size: 13px; color: var(--amber); letter-spacing: 2px; font-family: var(--font-mono); margin: 0 0 14px; text-align: center; }
    .info { color: var(--text2); font-size: 11px; font-family: var(--font-mono); text-align: center; margin-bottom: 18px; line-height: 1.6; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); letter-spacing: 1.5px; }
    .field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; }
    .field input:focus { outline: none; border-color: var(--amber); }
    .btn { width: 100%; background: var(--amber); border: none; color: #1a1408; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 6px; }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .ok  { color: var(--green); font-size: 11px; font-family: var(--font-mono); text-align: center; margin-top: 14px; line-height: 1.6; }
    .back { text-align: center; margin-top: 18px; }
    .back a { color: var(--text3); font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-decoration: none; }
    .back a:hover { color: var(--amber); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">MO<span class="accent">D</span>ECISSIONS</div>
    <div class="tagline">DECISION INTELLIGENCE PLATFORM</div>
    <h2>RECUPERAR PASSWORD</h2>
    <div class="info">Introduce tu email y te enviaremos un link para crear un nuevo password.</div>
    <form id="f-form" onsubmit="return doForgot(event)">
      <div class="field"><label>EMAIL</label>
        <input id="email" type="email" autocomplete="username" required autofocus>
      </div>
      <button type="submit" class="btn" id="btn">ENVIAR LINK →</button>
    </form>
    <div class="ok" id="msg" style="display:none"></div>
    <div class="back"><a href="/login">← VOLVER A LOGIN</a></div>
  </div>

  <script>
    document.documentElement.dataset.theme = localStorage.getItem('mod-theme') || 'dark';

    async function doForgot(ev) {
      ev.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      try {
        await fetch('/auth/forgot-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email }),
        });
      } catch (e) { /* generic message regardless */ }
      document.getElementById('f-form').style.display = 'none';
      const msg = document.getElementById('msg');
      msg.style.display = '';
      msg.textContent = '✓ Si la cuenta existe, recibirás un correo con instrucciones en breve.';
      return false;
    }
  </script>
</body>
</html>
