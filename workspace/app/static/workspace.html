<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace — MODecissions</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────────────────────── */
    :root {
      --bg: #f8f7f4; --bg2: #ffffff; --bg3: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827; --text2: #6b7280; --text3: #9ca3af;
      --green: #059669; --amber: #2563eb; --cyan: #2563eb; --red: #dc2626;
      --font-ui: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font-ui); font-size: 14px; overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 28px; height: 64px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-ui); font-weight: 700; letter-spacing: 0;
      color: var(--text); font-size: 18px;
    }
    .logo .accent { color: var(--cyan); }
    .tagline {
      font-size: 13px; color: var(--text2); letter-spacing: 0; margin-top: 2px;
    }
    .user-bar {
      display: flex; align-items: center; gap: 14px; margin-left: auto;
      font-family: var(--font-ui); font-size: 13px; letter-spacing: 0;
      color: var(--text2);
    }
    .user-bar .me { color: var(--text2); }
    .user-bar .me strong { color: var(--text); }
    .user-bar a { color: var(--text3); text-decoration: none; }
    .user-bar a:hover { color: var(--cyan); }
    .role-pill {
      padding: 3px 8px; border-radius: 999px; font-size: 11px;
      letter-spacing: 0; background: var(--bg3); color: var(--text2);
    }
    .role-pill.admin { background: rgba(37,99,235,.10); color: var(--cyan); }

    /* ── Main split ─────────────────────────────────────────────────────── */
    .main {
      display: grid; grid-template-columns: minmax(0, 1fr) 440px;
      height: calc(100vh - 64px);
      gap: 20px; background: var(--bg); padding: 20px;
    }
    @media (max-width: 1100px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }

    .pane {
      background: var(--bg2); overflow-y: auto;
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, .04);
    }
    .pane-head {
      padding: 14px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; background: var(--bg2); z-index: 10;
    }
    .pane-head .icon { color: var(--cyan); font-size: 18px; }
    .pane-head h2 {
      font-family: var(--font-ui); font-size: 16px;
      color: var(--text); letter-spacing: 0; flex: 1;
    }

    /* ── Apps grid ──────────────────────────────────────────────────────── */
    .apps-grid {
      padding: 22px; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .app-card {
      background: #ffffff; border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column;
      gap: 12px; transition: border-color .15s, transform .15s, box-shadow .15s;
      text-decoration: none; color: inherit;
    }
    .app-card:hover { border-color: var(--cyan); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(17,24,39,.08); }
    .app-icon { font-size: 18px; color: var(--cyan); }
    .app-title {
      font-family: var(--font-ui); font-size: 16px; font-weight: 700;
      color: var(--text); letter-spacing: 0;
    }
    .app-desc { font-size: 13px; color: var(--text2); line-height: 1.6; flex: 1; }
    .app-meta { font-size: 12px; color: var(--text3); font-family: var(--font-ui); }
    .empty-state {
      padding: 60px 20px; text-align: center;
      color: var(--text2); font-size: 13px; line-height: 1.7;
      font-family: var(--font-ui);
    }
    .empty-icon { font-size: 32px; opacity: .4; margin-bottom: 10px; }

    /* ── Tab nav (left pane) ─────────────────────────────────────────────── */
    .tab-nav {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .tab-btn {
      padding: 14px 20px; cursor: pointer;
      background: transparent; border: none; border-bottom: 2px solid transparent;
      font-family: var(--font-ui); font-size: 13px; color: var(--text2);
      letter-spacing: 0; transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-btn .count {
      display: inline-block; margin-left: 6px; padding: 1px 6px;
      background: var(--bg3); border-radius: 999px; font-size: 11px; color: var(--text2);
    }
    .tab-btn.active .count { background: rgba(88,166,255,.15); color: var(--cyan); }
    .tab-page { display: none; }
    .tab-page.active { display: block; }
    .pane-toolbar {
      padding: 14px 22px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); background: var(--bg2);
    }
    .pane-toolbar .spacer { flex: 1; }

    /* ── Decisions table ────────────────────────────────────────────────── */
    .dec-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .dec-table th, .dec-table td {
      text-align: left; padding: 9px 14px; border-bottom: 1px solid var(--border);
    }
    .dec-table th {
      font-family: var(--font-ui); font-size: 12px; color: var(--text2);
      letter-spacing: 0; background: var(--bg3);
    }
    .dec-table tbody tr { cursor: pointer; transition: background .12s; }
    .dec-table tbody tr:hover { background: var(--bg3); }
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 3px;
      font-family: var(--font-ui); font-size: 11px; letter-spacing: 0;
    }
    .b-open    { background: rgba(63,185,80,.12);  color: var(--green); }
    .b-closed  { background: rgba(110,118,129,.18); color: var(--text2); }
    .b-overdue { background: rgba(248,81,73,.12);  color: var(--red); }
    .b-ok      { background: rgba(63,185,80,.18);  color: var(--green); }
    .b-fail    { background: rgba(248,81,73,.12);  color: var(--red); }
    .b-shared  { background: rgba(88,166,255,.12); color: var(--cyan); }
    .b-private { background: rgba(110,118,129,.18); color: var(--text2); }

    .btn-pri {
      background: var(--cyan); border: none; color: #ffffff;
      font-family: var(--font-ui); font-size: 13px; letter-spacing: 0;
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600;
    }
    .btn-pri:hover { filter: brightness(1.1); }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-family: var(--font-ui); font-size: 13px;
      letter-spacing: 0; padding: 7px 12px; border-radius: 8px; cursor: pointer;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text2); }
    .btn-danger {
      background: transparent; border: 1px solid var(--red);
      color: var(--red); font-family: var(--font-ui); font-size: 13px;
      letter-spacing: 0; padding: 7px 12px; border-radius: 8px; cursor: pointer;
    }
    .filter-pill {
      background: var(--bg2); border: 1px solid var(--border); cursor: pointer;
      color: var(--text2); padding: 7px 12px; border-radius: 999px;
      font-family: var(--font-ui); font-size: 12px; letter-spacing: 0;
    }
    .filter-pill.active { color: var(--cyan); border-color: var(--cyan); }

    /* ── Modal ──────────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(17,24,39,.35); z-index: 100;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 5vh;
    }
    .modal {
      background: #ffffff; border: 1px solid var(--border); border-radius: 12px;
      width: min(620px, 92vw); max-height: 88vh; overflow: auto;
      box-shadow: 0 24px 60px rgba(17,24,39,.16);
    }
    .modal-head {
      padding: 14px 20px; display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid var(--border);
    }
    .modal-head h3 { margin: 0; font-family: var(--font-ui); font-size: 18px; color: var(--text); letter-spacing: 0; }
    .modal-close { background: transparent; border: none; color: var(--text3); font-size: 18px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-family: var(--font-ui); font-size: 12px; color: var(--text2); letter-spacing: 0; font-weight: 600; }
    .field input, .field select, .field textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 9px 11px; border-radius: 8px; font-family: var(--font-ui); font-size: 13px;
    }
    .field textarea { min-height: 70px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--cyan); }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .sub-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
    .sub-tab { padding: 8px 14px; cursor: pointer; font-family: var(--font-ui); font-size: 13px; color: var(--text2); letter-spacing: 0; border-bottom: 2px solid transparent; }
    .sub-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .actions-list { display: flex; flex-direction: column; gap: 8px; }
    .action-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 10px 12px;
    }
    .action-meta { display: flex; gap: 12px; font-family: var(--font-ui); font-size: 12px; color: var(--text3); margin-bottom: 5px; }

    /* ── KPI editor ──────────────────────────────────────────────────── */
    .kpi-row {
      display: grid; grid-template-columns: 1.4fr 1.4fr 0.5fr 0.7fr 0.9fr 1.3fr auto;
      gap: 6px; align-items: end; padding: 8px 0; border-bottom: 1px dashed var(--border);
    }
    .kpi-row > div > label {
      font-family: var(--font-ui); font-size: 11px; color: var(--text2);
      letter-spacing: 0; display: block; margin-bottom: 3px;
    }
    .kpi-row select, .kpi-row input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 7px; border-radius: 3px;
      font-size: 12px; font-family: var(--font-ui);
    }
    .kpi-row select:focus, .kpi-row input:focus { outline: none; border-color: var(--cyan); }
    .kpi-empty { padding: 14px; text-align: center; color: var(--text2); font-size: 13px; font-family: var(--font-ui); }

    /* ── Chat: convert-to-decision button ─────────────────────────────── */
    .chat-actions {
      align-self: flex-start; display: flex; gap: 6px; margin-top: -8px;
    }
    .chat-action-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-family: var(--font-ui); font-size: 12px;
      letter-spacing: 0; padding: 5px 9px; border-radius: 999px; cursor: pointer;
    }
    .chat-action-btn:hover { color: var(--cyan); border-color: var(--cyan); }

    /* ── Chat pane ──────────────────────────────────────────────────────── */
    .chat-pane { display: flex; flex-direction: column; overflow: hidden; }
    .chat-history {
      flex: 1; overflow-y: auto; padding: 18px 22px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { max-width: 92%; line-height: 1.5; font-size: 13px; }
    .msg.user {
      align-self: flex-end; background: rgba(37,99,235,.08);
      border: 1px solid rgba(37,99,235,.16);
      padding: 10px 14px; border-radius: 12px 12px 4px 12px;
    }
    .msg.assistant {
      align-self: flex-start; color: var(--text);
      padding: 4px 0;
    }
    .msg.assistant pre {
      background: var(--bg3); border: 1px solid var(--border); padding: 10px;
      border-radius: 8px; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 12px;
      overflow-x: auto; margin: 8px 0;
    }
    .msg.assistant code {
      background: var(--bg3); padding: 1px 5px; border-radius: 3px;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 12px;
    }
    .msg.assistant pre code { background: transparent; padding: 0; }
    .msg.assistant a { color: var(--cyan); text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.assistant p { margin-bottom: 8px; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.thinking {
      align-self: flex-start; color: var(--text3); font-style: italic;
      font-size: 12px; font-family: var(--font-ui); letter-spacing: 0;
    }
    .dot { animation: blink 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* ── Reasoning trail ────────────────────────────────────────────── */
    .trail {
      align-self: flex-start; max-width: 92%;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-family: var(--font-ui); font-size: 12px;
      color: var(--text2); display: flex; flex-direction: column; gap: 4px;
    }
    .trail-row { display: flex; gap: 8px; align-items: baseline; line-height: 1.4; }
    .trail-row.use      .trail-arrow { color: var(--cyan); }
    .trail-row.result   .trail-arrow { color: var(--green); }
    .trail-row.error    .trail-arrow { color: var(--red); }
    .trail-row .tool    { color: var(--text); font-weight: 600; }
    .trail-row .args    { color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px; }
    .trail-row .summary { color: var(--green); }
    .trail-row.thinking { color: var(--text3); font-style: italic; }
    .trail-arrow { display: inline-block; min-width: 14px; }
    .trail.collapsed .trail-row:not(.thinking) { display: none; }
    .trail-toggle {
      align-self: flex-start; background: transparent; border: none;
      color: var(--text2); font-family: var(--font-ui); font-size: 12px;
      letter-spacing: 0; cursor: pointer; padding: 0; margin-top: 2px;
    }
    .trail-toggle:hover { color: var(--cyan); }

    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      color: var(--text2); text-align: center; font-size: 13px;
      line-height: 1.7; font-family: var(--font-ui); letter-spacing: 0;
    }
    .chat-empty .icon { font-size: 28px; margin-bottom: 10px; opacity: .5; }
    .examples { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
    .example {
      background: #ffffff; border: 1px solid var(--border); padding: 8px 12px;
      border-radius: 8px; font-size: 13px; color: var(--text2);
      cursor: pointer; text-align: left; font-family: var(--font-ui);
      letter-spacing: 0;
    }
    .example:hover { border-color: var(--cyan); color: var(--text); }

    .chat-input-bar {
      border-top: 1px solid var(--border); padding: 14px 16px;
      background: var(--bg2);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-input-bar textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px;
      padding: 9px 12px; font-family: var(--font-ui); font-size: 13px;
      resize: none; min-height: 40px; max-height: 200px;
    }
    .chat-input-bar textarea:focus { outline: none; border-color: var(--cyan); }
    .btn-send {
      background: var(--cyan); border: none; color: #ffffff;
      padding: 9px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      font-family: var(--font-ui); font-size: 13px; letter-spacing: 0;
    }
    .btn-send:hover { filter: brightness(1.1); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">MO<span class="accent">D</span>ecissions Workspace</div>
      <div class="tagline">Aplicaciones, decisiones y asistente operativo</div>
    </div>
    <div class="user-bar" id="user-bar"><span class="me">…</span></div>
  </div>

  <div class="main">
    <!-- ── Left pane: tabs APPS / DECISIONES ── -->
    <div class="pane">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="apps" onclick="switchTab('apps')">Apps <span class="count" id="cnt-apps">·</span></button>
        <button class="tab-btn"        data-tab="decisions" onclick="switchTab('decisions')">Decisiones <span class="count" id="cnt-decisions">·</span></button>
      </div>

      <!-- APPS tab -->
      <div class="tab-page active" id="tab-apps">
        <div class="pane-toolbar">
          <h2 style="font-family:var(--font-ui);font-size:15px;color:var(--text);letter-spacing:0;flex:1">Aplicaciones publicadas</h2>
          <button class="btn-ghost" onclick="loadApps()">Actualizar</button>
        </div>
        <div id="apps-container"><div class="empty-state">Cargando…</div></div>
      </div>

      <!-- DECISIONES tab -->
      <div class="tab-page" id="tab-decisions">
        <div class="pane-toolbar">
          <button class="filter-pill active" data-filter="visible" onclick="setDecFilter('visible')">Visibles</button>
          <button class="filter-pill" data-filter="mine"     onclick="setDecFilter('mine')">Mías</button>
          <button class="filter-pill" data-filter="open"     onclick="setDecFilter('open')">Abiertas</button>
          <button class="filter-pill" data-filter="overdue"  onclick="setDecFilter('overdue')">Vencidas</button>
          <div class="spacer"></div>
          <button class="btn-pri" onclick="openNewDecision()">Nueva decisión</button>
        </div>
        <div id="decisions-container"><div class="empty-state">Cargando…</div></div>
      </div>
    </div>

    <!-- ── Chat pane ── -->
    <div class="pane chat-pane">
      <div class="pane-head">
        <span class="icon">●</span>
        <h2>Asistente</h2>
        <button class="btn-send" style="background:transparent;color:var(--text2);border:1px solid var(--border)"
                onclick="resetChat()" title="Nueva conversación">Nuevo chat</button>
      </div>
      <div class="chat-history" id="chat-history">
        <div class="chat-empty" id="chat-empty">
          <div class="icon">●</div>
          <div>Pregúntame algo sobre los datos, los KPIs o pídeme un dashboard.</div>
          <div class="examples">
            <button class="example" onclick="askExample(this)">¿Cuál fue el margen bruto del último trimestre?</button>
            <button class="example" onclick="askExample(this)">Genera un dashboard de horas por consultor.</button>
            <button class="example" onclick="askExample(this)">¿Qué políticas hay sobre proyectos T&amp;M vs fixed?</button>
          </div>
        </div>
      </div>
      <div class="chat-input-bar">
        <textarea id="chat-input" placeholder="Escribe tu pregunta…  (Shift+Enter = salto de línea)"
                  rows="1" onkeydown="onChatKey(event)"></textarea>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <div id="modal-host" style="display:none"></div>

  <script>
    function escHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmt(s){ return s ? String(s).slice(0,16).replace('T',' ') : '—'; }

    // ── User bar ───────────────────────────────────────────────────────
    let ME = null;
    async function loadMe() {
      try { const r = await fetch('/auth/me'); const d = await r.json(); ME = d.user; }
      catch { ME = null; }
      const bar = document.getElementById('user-bar');
      if (!ME) { bar.innerHTML = '<a href="/">Recargar</a>'; return; }
      bar.innerHTML = `
        <span class="me"><strong>${escHtml(ME.email)}</strong></span>
        <span class="role-pill ${ME.role==='admin'?'admin':''}">${escHtml(ME.role)}</span>
        <a href="${CONSOLE_URL}/me">Mi perfil</a>
        <a href="#" onclick="event.preventDefault();doLogout()">Salir</a>`;
    }
    async function doLogout(){
      await fetch('/auth/logout', {method:'POST'});
      location.href = (CONSOLE_URL || '') + '/login';
    }
    let CONSOLE_URL = '';
    async function loadConfig(){
      try { const r = await fetch('/api/config'); const d = await r.json(); CONSOLE_URL = d.console_url || ''; }
      catch { CONSOLE_URL = ''; }
    }

    // ── Apps ────────────────────────────────────────────────────────────
    async function loadApps() {
      const cont = document.getElementById('apps-container');
      cont.innerHTML = '<div class="empty-state">Cargando…</div>';
      try {
        const r = await fetch('/api/apps');
        const d = await r.json();
        const apps = d.apps || [];
        document.getElementById('cnt-apps').textContent = apps.length;
        if (!apps.length) {
          cont.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">▦</div>
              <div>Aún no hay apps publicadas.</div>
              <div style="margin-top:8px;color:var(--text2)">Pídele al asistente que genere uno.</div>
            </div>`;
          return;
        }
        cont.innerHTML = `<div class="apps-grid">${apps.map(a => `
          <a class="app-card" href="/apps/${escHtml(a.name)}" target="_blank">
            <div class="app-icon">▦</div>
            <div class="app-title">${escHtml(a.title || a.name)}</div>
            <div class="app-desc">${escHtml(a.description || '—')}</div>
            <div class="app-meta">Actualizado: ${fmt(a.updated_at)}</div>
          </a>`).join('')}</div>`;
      } catch (e) {
        cont.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${escHtml(e.message)}</div>`;
      }
    }

    // ── Chat ────────────────────────────────────────────────────────────
    let HISTORY = [];

    function onChatKey(ev){
      if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); sendMessage(); }
    }
    function askExample(btn){
      document.getElementById('chat-input').value = btn.textContent;
      sendMessage();
    }
    function resetChat(){
      HISTORY = [];
      const h = document.getElementById('chat-history');
      h.innerHTML = `
        <div class="chat-empty">
          <div class="icon">▣</div>
          <div>Nueva conversación.</div>
        </div>`;
    }
    function clearEmpty(){
      const e = document.getElementById('chat-empty');
      if (e) e.remove();
    }

    // Minimal markdown: links, bold, code, paragraphs
    function renderMarkdown(text){
      // Code blocks first (greedy)
      let html = text.replace(/```([a-z]*)\n?([\s\S]*?)```/g,
        (_, lang, code) => `<pre><code>${escHtml(code)}</code></pre>`);
      // Inline code
      html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
      // Links [text](url)
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+|\/[^)]*)\)/g,
        (_, t, u) => `<a href="${u}" target="_blank" rel="noopener">${escHtml(t)}</a>`);
      // Bold **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, (_, t) => `<strong>${t}</strong>`);
      // Paragraphs (split on double newline)
      const paras = html.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
      return paras;
    }

    function appendMessage(role, text){
      clearEmpty();
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(text);
      } else {
        div.textContent = text;
      }
      const h = document.getElementById('chat-history');
      h.appendChild(div);
      h.scrollTop = h.scrollHeight;
      return div;
    }

    function appendDecisionAction(question, reply){
      const wrap = document.createElement('div');
      wrap.className = 'chat-actions';
      const btn = document.createElement('button');
      btn.className = 'chat-action-btn';
      btn.textContent = 'Convertir en decisión';
      btn.onclick = () => decisionFromChat(question, reply);
      wrap.appendChild(btn);
      const h = document.getElementById('chat-history');
      h.appendChild(wrap);
      h.scrollTop = h.scrollHeight;
    }

    async function decisionFromChat(question, reply){
      // Build a sane prefill: title from the question, description with both sides
      const cleanReply = reply.replace(/[*_`#>|-]/g, ' ').replace(/\s+/g, ' ').trim();
      const title = question.length > 80 ? question.slice(0, 77).trim() + '…' : question;
      const desc =
        '── Origen (asistente del workspace) ──\n' +
        'Pregunta: ' + question + '\n\n' +
        'Respuesta:\n' + (cleanReply.length > 600 ? cleanReply.slice(0, 600) + '…' : cleanReply);
      // Ensure user dropdown has data before opening the modal
      if (!USERS.length) await loadUsers();
      if (!DECISIONS_LOADED) { DECISIONS_LOADED = true; loadDecisions(); }
      openNewDecision({ title, description: desc });
    }
    window.decisionFromChat = decisionFromChat;

    function makeTrail(){
      clearEmpty();
      const div = document.createElement('div');
      div.className = 'trail';
      const tk = document.createElement('div');
      tk.className = 'trail-row thinking';
      tk.innerHTML = 'Pensando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
      div.appendChild(tk);
      const h = document.getElementById('chat-history');
      h.appendChild(div);
      h.scrollTop = h.scrollHeight;
      return { container: div, thinking: tk };
    }

    function trailUse(trail, evt){
      // Drop the "Pensando…" row once the first real step lands
      if (trail.thinking) { trail.thinking.remove(); trail.thinking = null; }
      const row = document.createElement('div');
      row.className = 'trail-row use';
      const argStr = formatArgs(evt.args);
      row.innerHTML = `<span class="trail-arrow">▸</span><span class="tool">${escHtml(evt.tool)}</span>${argStr ? `<span class="args">${escHtml(argStr)}</span>` : ''}`;
      trail.container.appendChild(row);
      const h = document.getElementById('chat-history');
      h.scrollTop = h.scrollHeight;
      return row;
    }

    function trailResult(trail, evt){
      const row = document.createElement('div');
      row.className = 'trail-row result';
      row.innerHTML = `<span class="trail-arrow">↳</span><span class="summary">${escHtml(evt.summary || 'ok')}</span>`;
      trail.container.appendChild(row);
      const h = document.getElementById('chat-history');
      h.scrollTop = h.scrollHeight;
      return row;
    }

    function trailDone(trail, totalSteps){
      // Add a small toggle to collapse the trail after the answer arrives
      if (totalSteps === 0) {
        // No tool calls → trail is just the (now-removed) thinking row; drop the empty container
        trail.container.remove();
        return;
      }
      const tog = document.createElement('button');
      tog.className = 'trail-toggle';
      tog.textContent = `▾ ocultar razonamiento (${totalSteps} pasos)`;
      let collapsed = false;
      tog.onclick = () => {
        collapsed = !collapsed;
        trail.container.classList.toggle('collapsed', collapsed);
        tog.textContent = collapsed
          ? `▸ ver razonamiento (${totalSteps} pasos)`
          : `▾ ocultar razonamiento (${totalSteps} pasos)`;
      };
      trail.container.parentNode.insertBefore(tog, trail.container.nextSibling);
    }

    function formatArgs(args){
      if (!args || typeof args !== 'object') return '';
      const keys = Object.keys(args);
      if (!keys.length) return '';
      const parts = keys.slice(0, 3).map(k => {
        let v = args[k];
        if (typeof v === 'object') v = JSON.stringify(v);
        v = String(v);
        if (v.length > 40) v = v.slice(0, 37) + '…';
        return `${k}=${v}`;
      });
      const more = keys.length > 3 ? ` (+${keys.length - 3})` : '';
      return parts.join(', ') + more;
    }

    async function sendMessage(){
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('btn-send');
      input.value = '';
      btn.disabled = true;

      appendMessage('user', text);
      const trail = makeTrail();
      let toolSteps = 0;

      try {
        const r = await fetch('/workspace/chat/stream', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message: text, history: HISTORY }),
        });
        if (!r.ok) {
          trail.container.remove();
          const e = await r.json().catch(()=>({}));
          appendMessage('assistant', `*Error: ${escHtml(e.detail || r.statusText)}*`);
          return;
        }

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalReply = '';
        let finalMessages = null;
        let errored = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split('\n\n');
          buffer = blocks.pop() || '';
          for (const block of blocks) {
            if (!block.trim()) continue;
            const lines = block.split('\n');
            let event = '', data = '';
            for (const line of lines) {
              if      (line.startsWith('event: ')) event = line.slice(7).trim();
              else if (line.startsWith('data: '))  data += line.slice(6);
            }
            if (!data) continue;
            let payload;
            try { payload = JSON.parse(data); } catch { continue; }
            if (event === 'tool_use')      { trailUse(trail, payload);    toolSteps += 1; }
            else if (event === 'tool_result') trailResult(trail, payload);
            else if (event === 'text')        { /* final text — keep, render on done */ }
            else if (event === 'done')        { finalReply = payload.reply || ''; finalMessages = payload.messages; }
            else if (event === 'error')       { errored = payload.message || 'unknown error'; }
          }
        }

        trailDone(trail, toolSteps);

        if (errored) {
          appendMessage('assistant', `*Error: ${escHtml(errored)}*`);
          return;
        }
        const replyText = finalReply || '_(sin respuesta)_';
        appendMessage('assistant', replyText);
        appendDecisionAction(text, replyText);

        if (Array.isArray(finalMessages)) HISTORY = finalMessages;
        else HISTORY = [...HISTORY,
                         { role:'user', content:text },
                         { role:'assistant', content: replyText }];

        if (replyText.includes('/apps/')) loadApps();
      } catch (e) {
        trail.container.remove();
        appendMessage('assistant', `*Error de red: ${escHtml(e.message)}*`);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // ── Tabs (left pane) ────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-page').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
      if (tab === 'decisions' && !DECISIONS_LOADED) {
        DECISIONS_LOADED = true;
        loadUsers();
        loadDecisions();
      }
    }

    // ── Decisions ───────────────────────────────────────────────────────
    let DECISIONS_LOADED = false;
    let DEC_FILTER = 'visible';
    let USERS = [];

    async function loadUsers() {
      try { const r = await fetch('/api/users'); const d = await r.json(); USERS = d.users || []; }
      catch { USERS = []; }
    }
    function userLabel(uid) {
      if (!uid) return null;
      const u = USERS.find(x => x.id === uid);
      return u ? (u.name || u.email) : `#${uid}`;
    }
    function daysUntil(d) {
      if (!d) return null;
      const a = new Date(d + 'T00:00:00');
      const b = new Date(); b.setHours(0,0,0,0);
      return Math.round((a - b) / 86400000);
    }
    function fmtDate(s){ return s ? String(s).slice(0,10) : '—'; }

    function setDecFilter(f) {
      DEC_FILTER = f;
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      loadDecisions();
    }

    async function loadDecisions() {
      const cont = document.getElementById('decisions-container');
      cont.innerHTML = '<div class="empty-state">Cargando…</div>';
      const params = new URLSearchParams();
      if (DEC_FILTER === 'mine')    params.set('scope', 'mine');
      if (DEC_FILTER === 'open')    params.set('status', 'open');
      if (DEC_FILTER === 'overdue') params.set('overdue', 'true');
      try {
        const r = await fetch('/api/decisions?' + params.toString());
        const d = await r.json();
        const rows = d.decisions || [];
        document.getElementById('cnt-decisions').textContent = rows.length;
        if (!rows.length) {
          cont.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">▣</div>
              <div>Sin decisiones en este filtro.</div>
              <div style="margin-top:8px;color:var(--text2)">Pulsa "Nueva decisión" para registrar la primera.</div>
            </div>`;
          return;
        }
        cont.innerHTML = `<table class="dec-table">
          <thead><tr>
            <th>Título</th><th>Responsable</th><th>Visibilidad</th><th>Compromiso</th>
            <th>Estado</th><th>Resultado</th><th>Días</th>
          </tr></thead>
          <tbody>${rows.map(decRowHtml).join('')}</tbody>
        </table>`;
        cont.querySelectorAll('tbody tr').forEach(tr => {
          tr.addEventListener('click', () => openDecisionDetail(parseInt(tr.dataset.id, 10)));
        });
      } catch (e) {
        cont.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${escHtml(e.message)}</div>`;
      }
    }

    function decRowHtml(r) {
      const days = daysUntil(r.commitment_date);
      const statusLabel = r.status === 'open' ? 'Abierta' : (r.status === 'closed' ? 'Cerrada' : r.status);
      let statusBadge = `<span class="badge b-${r.status}">${escHtml(statusLabel)}</span>`;
      let daysCell = '—';
      if (r.status === 'open' && days !== null) {
        if (days < 0)      { statusBadge = `<span class="badge b-overdue">Vencida</span>`; daysCell = `<span style="color:var(--red)">${days}d</span>`; }
        else if (days <= 7) daysCell = `<span style="color:var(--amber)">${days}d</span>`;
        else                daysCell = `<span style="color:var(--text2)">${days}d</span>`;
      }
      let outcomeCell = '—';
      if (r.outcome === 'achieved')         outcomeCell = `<span class="badge b-ok">Logrado</span>`;
      else if (r.outcome === 'not_achieved') outcomeCell = `<span class="badge b-fail">No logrado</span>`;
      const responsable = userLabel(r.assignee_id) || `<span style="color:var(--text3)">—</span>`;
      const visBadge = r.visibility === 'shared'
        ? '<span class="badge b-shared" title="Visible para todo el equipo">Equipo</span>'
        : '<span class="badge b-private" title="Solo creador, responsable y admins">Privada</span>';
      return `<tr data-id="${r.id}">
        <td><strong>${escHtml(r.title)}</strong></td>
        <td style="color:var(--text2)">${responsable}</td>
        <td>${visBadge}</td>
        <td>${fmtDate(r.commitment_date)}</td>
        <td>${statusBadge}</td>
        <td>${outcomeCell}</td>
        <td>${daysCell}</td>
      </tr>`;
    }

    // ── New decision ────────────────────────────────────────────────────
    function userOpts(selectedId) {
      return ['<option value="">(sin asignar)</option>']
        .concat(USERS.map(u => `<option value="${u.id}" ${u.id===selectedId?'selected':''}>${escHtml(u.name||u.email)}</option>`))
        .join('');
    }

    function showModal(html) {
      const host = document.getElementById('modal-host');
      host.style.display = 'block';
      host.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">${html}</div>`;
    }
    function closeModal(){ document.getElementById('modal-host').style.display = 'none'; document.getElementById('modal-host').innerHTML = ''; }
    window.closeModal = closeModal;

    function openNewDecision(prefill) {
      const meId = ME ? ME.id : null;
      const pTitle = (prefill && prefill.title) || '';
      const pDesc  = (prefill && prefill.description) || '';
      showModal(`
        <div class="modal">
          <div class="modal-head">
            <h3>Nueva decisión</h3>
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          <div class="modal-body">
            <div class="field"><label>Título</label><input id="nd-title" placeholder="Reducir overhead en proyecto X" value="${escHtml(pTitle)}"></div>
            <div class="field"><label>Descripción</label><textarea id="nd-desc" placeholder="Contexto, motivación, criterio de éxito…">${escHtml(pDesc)}</textarea></div>
            <div class="field-grid">
              <div class="field"><label>Fecha compromiso</label><input id="nd-commit" type="date"></div>

          </div>

            <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn-pri" onclick="submitNewDecision()">Crear</button>
          </div>
        </div>`);
      setTimeout(() => document.getElementById('nd-title').focus(), 50);
    }
    window.openNewDecision = openNewDecision;
    window.submitNewDecision = async function() {
      const title = document.getElementById('nd-title').value.trim();
      if (!title) { alert('El título es obligatorio'); return; }
      const aRaw = document.getElementById('nd-assignee').value;
      const r = await fetch('/api/decisions', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          title,
          description: document.getElementById('nd-desc').value,
          commitment_date: document.getElementById('nd-commit').value || null,
          assignee_id: aRaw ? parseInt(aRaw, 10) : null,
          visibility: document.getElementById('nd-vis').value,
        })
      });
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        alert('Error: ' + (e.detail || r.statusText));
        return;
      }
      const d = await r.json();
      closeModal();
      switchTab('decisions');
      loadDecisions();
      openDecisionDetail(d.id);
    };

    // ── Decision detail ────────────────────────────────────────────────
    let CUR_DEC = null;

        if (!r.ok) throw new Error(r.statusText);
        CUR_DEC = await r.json();
      } catch(e) { alert('Error: ' + e.message); return; }

    window.openDecisionDetail = openDecisionDetail;

          <div class="modal-body">
            <div style="font-size:12px;color:var(--text2);font-family:var(--font-ui);letter-spacing:0;margin-bottom:14px">

              ${d.closed_at ? ' · cerrada ' + escHtml(d.closed_at.slice(0,10)) : ''}
            </div>

    window.renderDetailModal = renderDetailModal;

    function detailOverviewHtml(d) {
      return `
        <div class="field"><label>Título</label><input id="ed-title" value="${escHtml(d.title)}"></div>
        <div class="field"><label>Descripción</label><textarea id="ed-desc">${escHtml(d.description)}</textarea></div>
        <div class="field-grid">

    function detailActionsHtml(d) {
      const items = (d.actions || []).map(a => `
        <div class="action-card">

          <div style="font-size:12px">${escHtml(a.action_text)}</div>

    // ── KPI editor ──────────────────────────────────────────────────────
    const KPI_OPS = ['>=', '>', '<=', '<', '=', '!='];
    let DATASETS = null;            // [{name, layer}, ...]
    const SCHEMAS = {};              // {dataset: [{name, type}, ...]}
    let WORKING_KPIS = [];           // mutable list while editing

    function detailKpisHtml(d) {
      WORKING_KPIS = JSON.parse(JSON.stringify(d.kpis || []));
      return `
        <div id="kpi-list"></div>
        <div style="margin-top:14px">
          <button class="btn-ghost" onclick="addKpiRow()">Añadir KPI</button>
        </div>
        <div style="font-size:12px;color:var(--text2);font-family:var(--font-ui);margin-top:14px;letter-spacing:0">
          Cada KPI define una métrica medible: dataset → columna → operador → target → periodo.
          El agente futuro evaluará automáticamente estos KPIs en la fecha compromiso.
        </div>`;
    }

    async function fetchDatasets() {
      if (DATASETS) return DATASETS;
      try {
        const r = await fetch('/api/datasets');
        const d = await r.json();
        DATASETS = (d.datasets || []).map(x => ({ name: x.name, layer: x.layer || 'silver' }));
      } catch { DATASETS = []; }
      return DATASETS;
    }
    async function fetchSchema(name) {
      if (SCHEMAS[name]) return SCHEMAS[name];
      try {
        const r = await fetch('/api/datasets/' + encodeURIComponent(name) + '/schema');
        const d = await r.json();
        SCHEMAS[name] = d.schema || d.fields || [];
      } catch { SCHEMAS[name] = []; }
      return SCHEMAS[name];
    }

    async function initKpiEditor() {
      await fetchDatasets();
      // Pre-warm schema for any dataset already referenced
      for (const k of WORKING_KPIS) {
        if (k.dataset) await fetchSchema(k.dataset);
      }
      renderKpiList();
    }

    function renderKpiList() {
      const cont = document.getElementById('kpi-list');
      if (!cont) return;
      if (!WORKING_KPIS.length) {
        cont.innerHTML = '<div class="kpi-empty">Sin KPIs definidos. Pulsa "Añadir KPI" para crear el primero.</div>';
        return;
      }
      cont.innerHTML = WORKING_KPIS.map((k, i) => kpiRowHtml(k, i)).join('');
      WORKING_KPIS.forEach((_, i) => bindKpiRow(i));
    }

    function kpiRowHtml(k, i) {
      const dsOpts = (DATASETS || []).map(d =>
        `<option value="${escHtml(d.name)}" ${k.dataset===d.name?'selected':''}>${escHtml(d.name)} [${d.layer}]</option>`
      ).join('');
      return `<div class="kpi-row" data-i="${i}">
        <div><label>Dataset</label>
          <select data-f="dataset"><option value="">—</option>${dsOpts}</select>
        </div>
        <div><label>Columna</label>
          <select data-f="column"><option value="">—</option></select>
        </div>
        <div><label>OP</label>
          <select data-f="operator">${KPI_OPS.map(o=>`<option ${k.operator===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
        <div><label>Target</label><input data-f="target" value="${escHtml(k.target||'')}" placeholder="15"></div>
        <div><label>Periodo</label><input data-f="period" value="${escHtml(k.period||'')}" placeholder="2026-Q2"></div>
        <div><label>Etiqueta</label><input data-f="label" value="${escHtml(k.label||'')}" placeholder="Margen mínimo"></div>
        <div><button class="btn-danger" onclick="removeKpiRow(${i})">×</button></div>
      </div>`;
    }

    async function bindKpiRow(i) {
      const row = document.querySelector(`.kpi-row[data-i="${i}"]`);
      if (!row) return;
      const k = WORKING_KPIS[i];
      const colSel = row.querySelector('[data-f="column"]');
      if (k.dataset) {
        const cols = await fetchSchema(k.dataset);
        colSel.innerHTML = '<option value="">—</option>' + cols.map(c =>
          `<option value="${escHtml(c.name)}" ${k.column===c.name?'selected':''}>${escHtml(c.name)} <${escHtml(c.type||'')}></option>`
        ).join('');
      }
      row.querySelectorAll('[data-f]').forEach(el => {
        el.addEventListener('change', async () => {
          const f = el.dataset.f;
          k[f] = el.value;
          if (f === 'dataset') {
            k.column = '';
            const cols = await fetchSchema(k.dataset);
            colSel.innerHTML = '<option value="">—</option>' + cols.map(c =>
              `<option value="${escHtml(c.name)}"><${escHtml(c.type||'')}> ${escHtml(c.name)}</option>`
            ).join('');
          }
        });
        el.addEventListener('input', () => { k[el.dataset.f] = el.value; });
      });
    }

    window.addKpiRow = function() {
      WORKING_KPIS.push({ dataset:'', column:'', operator:'>=', target:'', period:'', label:'' });
      renderKpiList();
    };
    window.removeKpiRow = function(i) {
      WORKING_KPIS.splice(i, 1);
      renderKpiList();
    };

    window.saveDecisionKpis = async function(id) {
      // Drop incomplete rows
      const cleaned = WORKING_KPIS.filter(k => k.dataset && k.column);
      const r = await fetch('/api/decisions/' + id, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ kpis: cleaned })
      });
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        alert('Error: ' + (e.detail || r.statusText));
        return;
      }
      const d = await r.json();
      CUR_DEC.kpis = d.kpis || [];
      renderDetailModal('kpis');
    };

    window.saveDecisionOverview = async function(id) {
      const aRaw = document.getElementById('ed-assignee').value;
      const body = {
        title:           document.getElementById('ed-title').value.trim(),
        description:     document.getElementById('ed-desc').value,
        commitment_date: document.getElementById('ed-commit').value || null,
        status:          document.getElementById('ed-status').value,
        outcome:         document.getElementById('ed-outcome').value || null,
        assignee_id:     aRaw ? parseInt(aRaw, 10) : null,
        visibility:      document.getElementById('ed-vis').value,
      };
      if (!body.title) { alert('El título no puede estar vacío'); return; }
      const r = await fetch('/api/decisions/' + id, {
        method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        alert('Error: ' + (e.detail || r.statusText));
        return;
      }
      closeModal();
      loadDecisions();
    };

    window.addDecisionAction = async function(id) {
      const txt = document.getElementById('ac-text').value.trim();
      if (!txt) return;
      const r = await fetch('/api/decisions/' + id + '/actions', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action_text: txt })
      });
      if (!r.ok) { alert('Error: ' + r.statusText); return; }
      // Refetch and re-render the actions tab
      const r2 = await fetch('/api/decisions/' + id);
      CUR_DEC = await r2.json();
      renderDetailModal('actions');
    };

    window.deleteDecision = async function(id) {
      if (!confirm('¿Eliminar esta decisión y toda su bitácora? No se puede deshacer.')) return;
      const r = await fetch('/api/decisions/' + id, { method: 'DELETE' });
      if (!r.ok) { alert('Error: ' + r.statusText); return; }
      closeModal();
      loadDecisions();
    };

    // ── Boot ────────────────────────────────────────────────────────────
    (async () => {
      await loadConfig();
      await loadMe();
      loadApps();
    })();
  </script>
</body>
</html>
