# MODecissions Vault — secrets, connections and destinations
# Mount this file as a volume; edit to rotate credentials without rebuilding.
# On startup the Vault seeds these into PostgreSQL (ON CONFLICT DO NOTHING).
# To update a credential after first boot use the Studio AI or PUT /connections.

secrets:
  replicon:
    service_db_url: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/modecissions"
    gold_db_url:    "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_gold:5433/modecissions_gold"
  console:
    service_db_url: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/modecissions"
  refinement:
    service_db_url: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/modecissions"
    gold_db_url:    "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_gold:5433/modecissions_gold"

# ── API connections (cartridge credentials) ────────────────────────────────────
# Seeded once on first boot. Edit via Studio AI (vault_set_connection tool)
# or directly here + POST /reload (only fills blanks, won't overwrite existing).
connections:
  replicon:
    analytics:
      base_url:    ""          # e.g. https://na5.replicon.com/analytics
      auth_method: bearer_token
      token:       ""
    services:
      base_url:    ""          # e.g. https://na5.replicon.com/services
      auth_method: bearer_token
      token:       ""

# ── Platform destinations (internal services) ──────────────────────────────────
destinations:
  postgres_service:
    host:     postgres
    port:     5432
    db:       modecissions
    user:     ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url:      "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/modecissions"

  postgres_gold:
    host:     postgres_gold
    port:     5433
    db:       modecissions_gold
    user:     ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url:      "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_gold:5433/modecissions_gold"

  minio:
    endpoint:   minio:9000
    access_key: ${MINIO_ACCESS_KEY}
    secret_key: ""
    bucket:     lakehouse
    secure:     false
